        max-width: min(100%, var(--lg_size_container_w)) !important;
        min-width: 0 !important;
        box-sizing: border-box;
        border-radius: var(--lg_radius_container) !important;
        --ha-card-border-radius: var(--lg_radius_container) !important;
      }
      {{ lg_container_grid_extra_styles() }}
      {{ lg_glass_card_shell_extra_styles('--lg_radius_container', '--lg_size_container_w', 'var(--lg_size_container_h)') }}
      {{ lg_name_label_extra_styles('--lg_font_label_size', '--lg_font_title_weight', '--lg_font_label_tracking', '--lg_line_height_label') }}
