{%- endmacro %}
{% macro lg_name_label_extra_styles(size_token, weight_token, tracking_token, line_height_token) -%}
      #name {
        position: relative;
        z-index: 2;
        color: var(--lg_color_text);
        font-family: var(--lg_font_label_family);
        font-size: var({{ size_token }});
        font-weight: var({{ weight_token }});
        letter-spacing: var({{ tracking_token }});
        -webkit-font-smoothing: var(--lg_font_smoothing);
