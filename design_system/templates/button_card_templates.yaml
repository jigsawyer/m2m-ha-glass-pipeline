            card.__lgClimateTempMod = tempMod;
            card.__lgClimateSliderEl = sliderEl;
            card.__lgClimateSliderButton = button;
            card.__lgClimateOptimisticBound = true;
            sliderEl.addEventListener('pointerdown', bridge.down, false);
            sliderEl.addEventListener('pointermove', bridge.move, false);
            sliderEl.addEventListener('pointerup', bridge.up, false);
