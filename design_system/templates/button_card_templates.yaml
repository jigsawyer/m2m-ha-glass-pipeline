  # Half-size ± setpoint steppers — heat/cool only (parent #temp_steps gates visibility).
  climate_temp_step_btn:
    show_icon: true
    show_name: false
    show_state: false
    show_label: false
    show_ripple: false
    variables:
      direction: 1
    tap_action:
      action: call-service
      service: climate.set_temperature
      target:
        entity_id: "[[[ return (entity && entity.entity_id) || '' ]]]"
      data:
        temperature: |
          [[[
            const a = (entity && entity.attributes) || {};
            const cur = Number(a.temperature);
            const step = Number(a.target_temp_step) || 1;
            const lo = Number(a.min_temp);
            const hi = Number(a.max_temp);
            const dir = Number(variables.direction) || 1;
            if (!Number.isFinite(cur)) return cur;
            let next = cur + (dir * step);
            if (Number.isFinite(lo)) next = Math.max(lo, next);
            if (Number.isFinite(hi)) next = Math.min(hi, next);
            const rounded = Math.round(next / step) * step;
            return Math.round(rounded * 10) / 10;
          ]]]
