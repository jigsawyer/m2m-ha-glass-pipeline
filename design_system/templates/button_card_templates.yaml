        max-width: min(100%, var(--lg_size_disable_room_w)) !important;
        min-width: 0 !important;
        height: var(--lg_size_disable_room_h) !important;
        max-height: var(--lg_size_disable_room_h) !important;
        min-height: var(--lg_size_disable_room_h) !important;
