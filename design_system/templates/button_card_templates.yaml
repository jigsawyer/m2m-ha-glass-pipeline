  # Climate-only long timer bar (mirrors disable_room look via climate-scoped tokens; do NOT edit disable_room_button).
  # Opens Bubble pop-up via navigate hash (constraints.allow_hacs_bubble_card_popup).
  climate_timer_button:
    show_icon: false
    show_name: true
    show_state: false
    show_label: false
    show_ripple: false
    variables:
      clock_entity_id: ""
      armed_entity_id: ""
      popup_hash: ""
    name: |
      [[[
        const idle = 'Встановити таймер';
        const fmtClock = (hh, mm) => `Вимкнеться: ${String(hh).padStart(2, '0')}:${String(mm).padStart(2, '0')}`;
        if (entity && entity.state && (entity.state === 'active' || entity.state === 'paused')) {
          const fin = entity.attributes && entity.attributes.finishes_at;
          if (!fin) return 'Вимкнеться: …';
          const d = new Date(fin);
          if (Number.isNaN(d.getTime())) return 'Вимкнеться: …';
          return fmtClock(d.getHours(), d.getMinutes());
        }
        const armedId = variables && variables.armed_entity_id;
        const clockId = variables && variables.clock_entity_id;
        if (armedId && clockId && states[armedId] && states[armedId].state === 'on') {
          const clock = states[clockId];
          if (clock && clock.state) {
            const parts = String(clock.state).split(':');
            if (parts.length >= 2) return fmtClock(parts[0], parts[1]);
          }
          return 'Вимкнеться: …';
        }
        return idle;
      ]]]
    tap_action:
      action: navigate
      navigation_path: "[[[ return (variables && variables.popup_hash) || '' ]]]"
    extra_styles: |
      :host {
        width: min(100%, var(--lg_size_climate_timer_bar_w)) !important;
        max-width: min(100%, var(--lg_size_climate_timer_bar_w)) !important;
        min-width: 0 !important;
        height: var(--lg_size_climate_timer_bar_h) !important;
        max-height: var(--lg_size_climate_timer_bar_h) !important;
        min-height: var(--lg_size_climate_timer_bar_h) !important;
        display: block;
        box-sizing: border-box;
        margin: 0 !important;
        background: transparent !important;
        box-shadow: none !important;
        filter: none !important;
        overflow: visible !important;
        --ha-card-border-radius: var(--lg_radius_liquid) !important;
