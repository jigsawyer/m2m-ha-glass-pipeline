{# Tall column temperature glass chrome (Apple-style pill).
   Fill is painted on #temp_mod::before (setpoint %) — shell is rim/frost only so
   slider inherit fill can show through during drag (use_state_color:false → inherit). #}
{% macro lg_climate_cc_shell_extra_styles() -%}
      .lg-climate-cc {
        position: absolute;
        inset: 0;
        border-radius: var(--lg_radius_climate_cc);
        overflow: hidden;
        clip-path: inset(0 round var(--lg_radius_climate_cc));
