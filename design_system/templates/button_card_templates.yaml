      }
      .lg-glass-stack__fill {
        background: var(--lg_color_room_glass_fill);
        backdrop-filter: blur(var(--lg_blur_room_glass)) saturate(var(--lg_saturate_room_glass));
        -webkit-backdrop-filter: blur(var(--lg_blur_room_glass)) saturate(var(--lg_saturate_room_glass));
      }
