{%- endif %}
{%- endmacro %}
{# Klimat chips: icon above UA name INSIDE circle; chrome = climate_house_off tab-side.
   Proven icon bug: #img-cell clip-path creates stacking context so sibling #liquid_clip
   (z-index:0) painted over #icon. Fix: no clip on #img-cell; #img-cell/#name z-index:1
   over tab-side #liquid_clip (same pattern as lg_tab_side_btn_layout_extra_styles).
   Apple CC Klimat: liquid disk is icon-only perfect circle; UA label sits BELOW outside glass. #}
{% macro lg_climate_chip_icon_extra_styles() -%}
      {# Host = dock column (label band); liquid disk stays AIC circle diameter. #}
      #container {
        display: grid !important;
        grid-template-areas: "i" "n" !important;
        grid-template-columns: var(--lg_size_climate_dock_col) !important;
        grid-template-rows: var(--lg_size_aic_btn) var(--lg_size_climate_chip_label_h) !important;
        justify-content: center !important;
        justify-items: center !important;
        align-content: start !important;
        row-gap: var(--lg_space_climate_chip_label_gap) !important;
        width: var(--lg_size_climate_dock_col) !important;
        min-width: var(--lg_size_climate_dock_col) !important;
        max-width: var(--lg_size_climate_dock_col) !important;
        height: var(--lg_size_climate_chip_host_h) !important;
        min-height: var(--lg_size_climate_chip_host_h) !important;
        max-height: var(--lg_size_climate_chip_host_h) !important;
        aspect-ratio: unset !important;
        margin: 0 auto !important;
        box-sizing: border-box !important;
        overflow: visible !important;
        border-radius: 0 !important;
        clip-path: none !important;
        position: relative !important;
        padding: 0 !important;
      }
      #img-cell {
        grid-area: i !important;
        position: relative !important;
        z-index: 1 !important;
        display: flex !important;
        align-items: center !important;
        justify-content: center !important;
        justify-self: center !important;
        align-self: start !important;
        place-self: start center !important;
        width: var(--lg_size_aic_btn) !important;
        height: var(--lg_size_aic_btn) !important;
        min-width: var(--lg_size_aic_btn) !important;
        max-width: var(--lg_size_aic_btn) !important;
        min-height: var(--lg_size_aic_btn) !important;
        max-height: var(--lg_size_aic_btn) !important;
        aspect-ratio: 1 / 1 !important;
        margin-left: auto !important;
        margin-right: auto !important;
        margin-top: 0 !important;
        margin-bottom: 0 !important;
        border-radius: var(--lg_radius_aic_btn) !important;
        overflow: hidden !important;
        clip-path: none !important;
        box-sizing: border-box !important;
        background: transparent !important;
      }
      {# Idle glass defaults; active chip overrides swap frost tint (keep blur — switch_button ON).
         Circle = icon row only. dock_col > aic_btn — H-center disk with left:50% + translateX. #}
      #liquid_clip {
        grid-area: i !important;
        position: absolute !important;
        inset: auto !important;
        top: 0 !important;
        left: 50% !important;
        right: auto !important;
        transform: translateX(-50%) !important;
        width: var(--lg_size_aic_btn) !important;
        height: var(--lg_size_aic_btn) !important;
        min-width: var(--lg_size_aic_btn) !important;
        min-height: var(--lg_size_aic_btn) !important;
        max-width: var(--lg_size_aic_btn) !important;
        max-height: var(--lg_size_aic_btn) !important;
        aspect-ratio: 1 / 1 !important;
        border-radius: var(--lg_radius_aic_btn) !important;
        overflow: hidden !important;
        clip-path: none !important;
        isolation: isolate !important;
        pointer-events: none !important;
        z-index: 0 !important;
        justify-self: center !important;
        align-self: start !important;
        margin-left: 0 !important;
        margin-right: 0 !important;
        background: var(--lg_color_disable_frost), var(--lg_color_liquid_base);
        background-blend-mode: normal, plus-lighter;
        backdrop-filter: blur(var(--lg_blur_liquid)) saturate(var(--lg_saturate_glass));
        -webkit-backdrop-filter: blur(var(--lg_blur_liquid)) saturate(var(--lg_saturate_glass));
        box-shadow: var(--lg_shadow_liquid);
      }
      #liquid_clip .lg-liquid-clip-shell {
        position: absolute !important;
        inset: 0 !important;
        width: 100% !important;
        height: 100% !important;
        border-radius: var(--lg_radius_aic_btn) !important;
        overflow: hidden !important;
        clip-path: none !important;
        pointer-events: none !important;
      }
      #icon,
      #icon ha-icon,
      #icon ha-svg-icon {
        display: flex !important;
        align-items: center !important;
        justify-content: center !important;
        place-content: center !important;
        place-items: center !important;
        line-height: 0 !important;
        margin: 0 auto !important;
        padding: 0 !important;
        width: var(--lg_size_climate_chip_icon) !important;
        height: var(--lg_size_climate_chip_icon) !important;
        max-width: var(--lg_size_climate_chip_icon) !important;
        max-height: var(--lg_size_climate_chip_icon) !important;
        overflow: visible !important;
      }
      #icon {
        --mdc-icon-size: var(--lg_size_climate_chip_icon);
        position: relative !important;
        z-index: 1 !important;
        left: auto !important;
        right: auto !important;
        justify-self: center !important;
        transform: translateY(var(--lg_space_icon_optical_nudge));
      }
      #icon ha-icon,
      #icon ha-svg-icon {
        --mdc-icon-size: var(--lg_size_climate_chip_icon);
      }
      #icon ha-svg-icon svg {
        display: block !important;
        margin: 0 auto !important;
      }
      #name {
        grid-area: n !important;
        position: relative !important;
        z-index: 1 !important;
        display: block !important;
        width: var(--lg_size_climate_dock_col) !important;
        min-width: var(--lg_size_climate_chip_label_min_w) !important;
        max-width: var(--lg_size_climate_dock_col) !important;
        height: var(--lg_size_climate_chip_label_h) !important;
        margin: 0 !important;
        padding: 0 !important;
        overflow: visible !important;
        text-overflow: clip !important;
        white-space: nowrap !important;
        text-align: center !important;
        justify-self: center !important;
        align-self: center !important;
        font-family: var(--lg_font_label_family) !important;
        font-size: var(--lg_font_climate_chip_size) !important;
        font-weight: var(--lg_font_label_weight) !important;
        line-height: var(--lg_line_height_label) !important;
        color: var(--lg_color_text) !important;
        opacity: 0.78;
      }
      #label, #state { display: none !important; }
{%- endmacro %}
{# Keep AIC macros for TEMP chrome; chips use liquid_clip (tab-side round language). #}
{% macro lg_aic_button_shell_extra_styles() -%}
      .lg-aic-btn {
        position: absolute;
        inset: 0;
        border-radius: 50%;
        overflow: hidden;
        clip-path: circle(50% at 50% 50%);
        isolation: isolate;
        pointer-events: none;
        z-index: 0;
      }
      .lg-aic-btn__darken,
      .lg-aic-btn__luminosity,
      .lg-aic-btn__frost {
        position: absolute;
        inset: 0;
        border-radius: 50%;
      }
      .lg-aic-btn__darken {
        background: var(--lg_color_climate_cc_layer_darken);
        mix-blend-mode: darken;
      }
      .lg-aic-btn__luminosity {
        background: var(--lg_color_climate_cc_layer_luminosity);
        mix-blend-mode: luminosity;
      }
      .lg-aic-btn__frost {
        background: var(--lg_color_climate_cc_frost);
        backdrop-filter: blur(var(--lg_blur_climate_cc));
        -webkit-backdrop-filter: blur(var(--lg_blur_climate_cc));
        mix-blend-mode: plus-lighter;
      }
      .lg-aic-btn__rim {
        position: absolute;
        inset: 0;
        border-radius: 50%;
        box-shadow: var(--lg_shadow_climate_cc_inset);
        pointer-events: none;
      }
{%- endmacro %}
