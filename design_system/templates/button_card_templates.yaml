<div class="lg-aic-btn" aria-hidden="true"><div class="lg-aic-btn__darken"></div><div class="lg-aic-btn__luminosity"></div><div class="lg-aic-btn__frost"></div><div class="lg-aic-btn__rim"></div></div>
