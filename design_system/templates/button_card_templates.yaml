        filter: blur(var(--lg_blur_tab_edge));
      }
      .lg-tab-edge-light {
        position: absolute;
        inset: 0;
        border-radius: var(--lg_radius_tab_inner);
        border: var(--lg_stroke_tab_edge) solid var(--lg_color_tab_edge_light_stroke);
        mix-blend-mode: plus-lighter;
        filter: blur(var(--lg_blur_tab_highlight));
      }
      .lg-tab-edge-soft {
        position: absolute;
        inset: 0;
        border-radius: var(--lg_radius_tab_inner);
        border: var(--lg_stroke_tab_edge) solid var(--lg_color_tab_border_soft);
        mix-blend-mode: plus-lighter;
        filter: blur(var(--lg_blur_tab_highlight));
      }
      .lg-tab-active {
        position: absolute;
        top: var(--lg_space_tab_active_top);
        left: var(--lg_space_tab_active_inset);
        width: var(--lg_size_tab_active_w);
        height: var(--lg_size_tab_active_h);
        border-radius: var(--lg_radius_tab_active);
        background: var(--lg_color_tab_active);
