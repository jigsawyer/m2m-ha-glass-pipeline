          };
          const tryBind = () => {
            if (card.__lgClimateBinding) return false;
            card.__lgClimateBinding = true;
            try {
              ensureTempModListeners();
              const found = findButton();
              if (!found) return false;
              bindTo(found.tempMod, found.sliderEl, found.button);
