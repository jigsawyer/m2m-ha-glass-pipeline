    show_state: false
    show_ripple: false
    icon: mdi:snowflake-off
    variables:
      ha_entity_ids: []
    tap_action:
      action: none
    hold_action:
      action: call-service
      service: climate.turn_off
      target: |
        [[[
          const ids = variables.ha_entity_ids;
          if (Array.isArray(ids) && ids.length) return { entity_id: ids };
          return {};
        ]]]
    extra_styles: |
      {{ lg_tab_side_btn_layout_extra_styles(disabled=false) }}
      .lg-liquid-clip-shell {
        position: absolute;
        inset: 0;
        border-radius: var(--lg_radius_tab_side_btn);
        overflow: hidden;
        clip-path: inset(0 round var(--lg_radius_tab_side_btn));
        pointer-events: none;
      }
    custom_fields:
      liquid_clip: >
        {{ lg_liquid_clip_shell_html() }}
      distort: ""
    state: []
