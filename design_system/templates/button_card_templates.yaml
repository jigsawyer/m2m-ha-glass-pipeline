        --ha-card-border-radius: var(--lg_radius_liquid) !important;
      }
      ha-card {
        width: min(100%, var(--lg_size_floor_btn_w)) !important;
        max-width: min(100%, var(--lg_size_floor_btn_w)) !important;
        min-width: 0 !important;
        height: var(--lg_size_floor_btn_h) !important;
        max-height: var(--lg_size_floor_btn_h) !important;
        min-height: var(--lg_size_floor_btn_h) !important;
        aspect-ratio: unset !important;
        box-sizing: border-box;
        border-radius: var(--lg_radius_liquid) !important;
        overflow: visible !important;
        margin-left: auto !important;
