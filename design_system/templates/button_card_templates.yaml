{# Figma Master_design_system 1:1090 — global button_card_templates dictionary
   Option 1: physical values = theme CSS vars; structural rules = extra_styles only.
   No native styles: objects (those become inline style="" on DOM).
   BAN color_type: blank-card on visual templates — button-card early-returns
   empty spacer before extra_styles (blank viewport). Default color_type: icon. #}
{% macro lg_glass_stack_extra_styles(radius_token) -%}
      .lg-glass-stack {
        position: absolute;
        inset: 0;
        border-radius: var({{ radius_token }});
        overflow: hidden;
        clip-path: inset(0 round var({{ radius_token }}));
        isolation: isolate;
        pointer-events: none;
      }
      .lg-glass-stack__fill,
      .lg-glass-stack__frost,
      .lg-glass-stack__luminosity {
        position: absolute;
        inset: 0;
        border-radius: var({{ radius_token }});
      }
      .lg-glass-stack__fill {
        background: var(--lg_color_glass_fill);
        backdrop-filter: blur(var(--lg_blur_container)) saturate(var(--lg_saturate_glass));
        -webkit-backdrop-filter: blur(var(--lg_blur_container)) saturate(var(--lg_saturate_glass));
      }
      .lg-glass-stack__frost {
        background: var(--lg_color_glass_frost);
        mix-blend-mode: plus-lighter;
      }
      .lg-glass-stack__luminosity {
        background: var(--lg_color_glass_luminosity);
        mix-blend-mode: soft-light;
      }
{%- endmacro %}
{% macro lg_room_glass_stack_extra_styles(radius_token) -%}
