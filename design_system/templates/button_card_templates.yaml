            const lo = Number.isFinite(Number(a.min_temp)) ? Number(a.min_temp) : Number(range.min);
            const hi = Number.isFinite(Number(a.max_temp)) ? Number(a.max_temp) : Number(range.max);
            const step = Number(a.target_temp_step) || Number(range.step) || 1;
            if (!Number.isFinite(lo) || !Number.isFinite(hi) || hi <= lo) return null;
            /* Inverse of HACS Controller.percentage (mattieha controller.ts). */
            const clamped = Math.max(0, Math.min(100, pct));
            const raw = lo + (clamped / 100) * (hi - lo);
            const rounded = Math.round(raw / step) * step;
            const value = Math.round(rounded * 10) / 10;
            return { value, fillPct: `${clamped}%` };
          };
          const clearPending = () => {
            card.__lgPendingTemp = undefined;
            card.__lgPendingFillPct = undefined;
            setHostVar('--lg_climate_pending_temp', '');
            writePending(null);
          };
          const paint = () => {
            if (card.__lgClimatePainting) return;
            card.__lgClimatePainting = true;
            try {
              if (!card.__lgClimateSliderButton || !card.__lgClimateSliderButton.isConnected) {
                if (!card.__lgClimateBinding) tryBind();
              }
              const button = card.__lgClimateSliderButton;
              const pending = readPending(button);
              if (!pending) return;
              const changing = button.classList && button.classList.contains('changing');
              const engaged = changing || card.__lgClimatePointerDown;
              const id = eid();
              const st = (id && card.hass && card.hass.states && card.hass.states[id]) || null;
              const haT = Number(
                (st && st.attributes && st.attributes.temperature)
                || (card.__lgClimateRange && card.__lgClimateRange.setT)
                || setT
              );
              if (!engaged && Number.isFinite(haT) && Math.abs(pending.value - haT) < 0.05) {
                clearPending();
                return;
              }
              const hadPending = typeof card.__lgPendingTemp === 'number'
                || !!card.style.getPropertyValue('--lg_climate_pending_temp');
              if (!engaged && !hadPending) return;
              /* Hide pending when equal to synced (box rule); keep fill live while engaged. */
              if (Number.isFinite(haT) && Math.abs(pending.value - haT) < 0.05) {
                if (hadPending) clearPending();
                else setHostVar('--lg_climate_temp_fill_pct', pending.fillPct);
                return;
              }
              card.__lgPendingTemp = pending.value;
              card.__lgPendingFillPct = pending.fillPct;
              setHostVar('--lg_climate_pending_temp', String(pending.value));
              setHostVar('--lg_climate_temp_fill_pct', pending.fillPct);
              writePending(pending.value);
            } finally {
              card.__lgClimatePainting = false;
            }
          };
          const rafLoop = () => {
            if (typeof card.__lgClimatePaint === 'function') card.__lgClimatePaint();
            const button = card.__lgClimateSliderButton;
            const changing = button && button.classList && button.classList.contains('changing');
            if (changing || card.__lgClimatePointerDown) {
              card.__lgClimateRaf = requestAnimationFrame(rafLoop);
            } else {
              card.__lgClimateRaf = undefined;
              if (typeof card.__lgClimatePaint === 'function') card.__lgClimatePaint();
            }
          };
          const startRaf = () => {
            if (card.__lgClimateRaf) return;
            card.__lgClimateRaf = requestAnimationFrame(rafLoop);
          };
          const onPointerDown = () => {
            card.__lgClimatePointerDown = true;
            tryBind();
            startRaf();
          };
          const onPointerMove = () => {
            startRaf();
          };
          const onPointerUp = () => {
            card.__lgClimatePointerDown = false;
            startRaf();
          };
          /* Indirection — styles re-eval swaps these each pass; DOM listeners stay once. */
          card.__lgClimatePaint = paint;
          card.__lgClimateStartRaf = startRaf;
          card.__lgClimateOnDown = onPointerDown;
          card.__lgClimateOnMove = onPointerMove;
          card.__lgClimateOnUp = onPointerUp;
          if (!card.__lgClimateBridge) {
            card.__lgClimateBridge = {
              down: () => { if (card.__lgClimateOnDown) card.__lgClimateOnDown(); },
              move: () => { if (card.__lgClimateOnMove) card.__lgClimateOnMove(); },
              up: () => { if (card.__lgClimateOnUp) card.__lgClimateOnUp(); },
              mo: () => { if (card.__lgClimateStartRaf) card.__lgClimateStartRaf(); },
            };
          }
          const unbindSliderOnly = () => {
            const sliderEl = card.__lgClimateSliderEl;
            const bridge = card.__lgClimateBridge;
            if (sliderEl && bridge) {
              /* Pointer-only — never attach touch* (passive touch on .slider makes HACS
                 onPointerDown preventDefault warn: Chrome scrolling intervention). */
              sliderEl.removeEventListener('pointerdown', bridge.down, false);
              sliderEl.removeEventListener('pointermove', bridge.move, false);
              sliderEl.removeEventListener('pointerup', bridge.up, false);
              sliderEl.removeEventListener('pointercancel', bridge.up, false);
            }
            if (card.__lgClimateBtnObserver) {
              card.__lgClimateBtnObserver.disconnect();
              card.__lgClimateBtnObserver = undefined;
            }
            card.__lgClimateSliderEl = undefined;
            card.__lgClimateSliderButton = undefined;
            card.__lgClimateOptimisticBound = false;
          };
          const ensureTempModListeners = () => {
            const root = card.shadowRoot;
            const tempMod = root && root.querySelector('#temp_mod');
            if (!tempMod) return null;
            const bridge = card.__lgClimateBridge;
            if (card.__lgClimateTempMod === tempMod && card.__lgClimateTempModListening) {
              return tempMod;
            }
            if (card.__lgClimateTempMod && card.__lgClimateTempModListening && bridge) {
              const prev = card.__lgClimateTempMod;
              prev.removeEventListener('pointerdown', bridge.down, true);
              prev.removeEventListener('pointermove', bridge.move, true);
              prev.removeEventListener('pointerup', bridge.up, true);
              prev.removeEventListener('pointercancel', bridge.up, true);
            }
            card.__lgClimateTempMod = tempMod;
            card.__lgClimateTempModListening = true;
            tempMod.addEventListener('pointerdown', bridge.down, true);
            tempMod.addEventListener('pointermove', bridge.move, true);
            tempMod.addEventListener('pointerup', bridge.up, true);
            tempMod.addEventListener('pointercancel', bridge.up, true);
            return tempMod;
          };
          const bindTo = (tempMod, sliderEl, button) => {
            ensureTempModListeners();
            const bridge = card.__lgClimateBridge;
            if (card.__lgClimateSliderButton === button && button.isConnected
                && card.__lgClimateOptimisticBound) {
              /* Refresh MO to current startRaf via bridge; handlers already swapped. */
              if (card.__lgClimateBtnObserver) {
                card.__lgClimateBtnObserver.disconnect();
              }
              const mo = new MutationObserver(bridge.mo);
              mo.observe(button, { attributes: true, attributeFilter: ['style', 'class'] });
              card.__lgClimateBtnObserver = mo;
