{% macro lg_container_grid_extra_styles() -%}
      {# !important required: button-card default styles.grid become inline and beat extra_styles #}
      #container {
        display: grid !important;
        grid-template-areas: "n" "content" !important;
        grid-template-columns: 1fr !important;
        grid-template-rows: min-content min-content !important;
        justify-items: center !important;
        justify-content: center !important;
        align-content: start !important;
      }
{%- endmacro %}
{% macro lg_glass_card_shell_extra_styles(radius_token, width_token, height_value) -%}
      #card {
        position: relative;
        overflow: visible;
        box-sizing: border-box;
        width: min(100%, var({{ width_token }}));
        max-width: min(100%, var({{ width_token }}));
        min-width: 0;
        min-height: 0;
        height: {{ height_value }};
        border-radius: var({{ radius_token }});
        border: var(--lg_stroke_glass) solid var(--lg_color_glass_rim);
        background: transparent;
        box-shadow: var(--lg_shadow_container);
        transition: var(--lg_transition_smooth);
        padding: var(--lg_space_label_top) var(--lg_space_gap_md) var(--lg_space_gap_md);
      }
      #glass_layers {
        position: absolute;
        inset: 0;
        border-radius: var({{ radius_token }});
        overflow: hidden;
        clip-path: inset(0 round var({{ radius_token }}));
        isolation: isolate;
        pointer-events: none;
        z-index: 0;
      }
{%- endmacro %}
{% macro lg_room_folder_shell_extra_styles(width_token) -%}
      {# iOS folder: #container grid — title row 1; #content + #glass_layers share panel row 2.
         button-card grid host is #container (not #card); custom fields use inline grid-area. #}
      #card {
        position: relative;
        overflow: visible;
        box-sizing: border-box;
        width: min(100%, var({{ width_token }}));
        max-width: min(100%, var({{ width_token }}));
        min-width: 0;
        min-height: 0;
        height: auto;
        padding: 0;
        margin: 0;
        border: none;
        background: transparent;
        box-shadow: none;
        transition: var(--lg_transition_smooth);
        /* Layout shell — not a control; docs: tap_action none removes pointer (#1038) */
        cursor: default;
      }
      #container {
        display: grid !important;
        grid-template-areas: "room_title" "room_panel" !important;
        grid-template-columns: 1fr !important;
        grid-template-rows: min-content min-content !important;
        justify-items: center !important;
        align-content: start !important;
        width: 100% !important;
      }
      #name {
        grid-area: room_title !important;
        margin-bottom: var(--lg_space_room_title_gap);
      }
      #content,
      #glass_layers {
        grid-area: room_panel !important;
      }
      #content {
        position: relative;
        z-index: 2;
        padding: var(--lg_space_gap_md);
        border-radius: var(--lg_radius_room);
        border: var(--lg_stroke_glass) solid var(--lg_color_room_glass_rim);
        box-shadow: var(--lg_shadow_room_container);
        overflow: hidden;
        margin-top: 0;
        box-sizing: border-box;
      }
      #glass_layers {
        z-index: 1;
        align-self: stretch !important;
        justify-self: stretch !important;
        position: relative;
        width: 100%;
        min-height: 0;
        border-radius: var(--lg_radius_room);
        overflow: hidden;
        clip-path: inset(0 round var(--lg_radius_room));
        isolation: isolate;
        pointer-events: none;
      }
{%- endmacro %}
{% macro lg_floor_folder_shell_extra_styles() -%}
