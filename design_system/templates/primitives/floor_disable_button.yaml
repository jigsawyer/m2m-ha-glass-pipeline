{# Figma 3:30 Component: floor_disable_button — thin instance #}
{%- set props = custom_props | default({}) %}
{%- set entity_ids = props.get('ha_entity_ids') %}
type: custom:button-card
template: floor_disable_button
name: {{ name }}
variables:
  ha_floor_id: "{% if not entity_ids and domain == 'floor' %}{{ entity_id }}{% endif %}"
  ha_entity_ids: {{ (entity_ids if entity_ids is sequence and entity_ids is not string else []) | tojson }}
