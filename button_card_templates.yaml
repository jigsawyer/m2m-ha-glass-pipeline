      card.__lgClockApplyFromInput = (el) => {
        const raw = (el && el.value) || card.__lgClockLastValue || '';
        if (!raw) return;
        const hass = card.hass;
        const hEid = card.__lgClockHourEid;
        const mEid = card.__lgClockMinuteEid;
        if (!hass || !hEid || !mEid) return;
        const parts = String(raw).split(':');
        const nh = clampInt(parseInt(parts[0], 10) || 0, 0, 23);
        const nm = clampInt(parseInt(parts[1], 10) || 0, 0, 59);
