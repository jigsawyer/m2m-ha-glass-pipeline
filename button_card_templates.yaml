# Arc Speed Dial option pill (ArcOption). Generalizes the retired
# climate_mode_chip (state-based: hvac_mode) + climate_attrib_chip
# (attribute-based: fan_mode) into one DRY template so the same pill
# powers both the HVAC-mode arc and the fan-speed arc. Service call
# payloads are byte-identical to the retired templates (preserve_behavior)
# — only the visual chrome (glass container, arc placement) is new.
# Position/stagger math lives here (reads variables.arc_index/arc_total,
# set by the parent climate_hvac_arc_dial / climate_fan_arc_dial); expand
# state (--lg_arc_t: 0|1, --lg_arc_transition: <string>) is an INHERITED
# CSS custom property set by the ancestor climate_arc_dial :host(.lg-arc-expanded)
# — proven cross-shadow-boundary technique already used for
# --lg_climate_temp_fill_color / --slider-color in climate_thermostat.
climate_arc_option_btn:
  show_name: true
  show_icon: true
  show_state: false
  show_ripple: false
  variables:
    check: state
    attrib: ""
    value: ""
    service: climate.set_hvac_mode
    data_key: hvac_mode
    arc_index: 0
    arc_total: 1
    arc_side: ""
  tap_action: |
    [[[
      /* Collapse the ancestor arc dial (climate_arc_dial :host carries
         .lg-arc-host + toggled .lg-arc-expanded) before the service call —
         SelectOption per spec: apply + close. Same composedParent walk
         already proven in climate_thermostat's slider binder. */
      const composedParent = (el) => {
        if (!el) return null;
        if (el.parentElement) return el.parentElement;
        const rn = el.getRootNode && el.getRootNode();
        return (rn && rn.host) || null;
      };
      let scope = composedParent(this);
      for (let i = 0; i < 12 && scope; i++) {
        if (scope.classList && scope.classList.contains('lg-arc-host')) {
          scope.classList.remove('lg-arc-expanded');
          break;
        }
        scope = composedParent(scope);
      }
      const key = variables.data_key || 'hvac_mode';
      return {
        action: 'call-service',
        service: variables.service || 'climate.set_hvac_mode',
        target: { entity_id: (entity && entity.entity_id) || '' },
        data: { [key]: variables.value },
      };
    ]]]
  extra_styles: |
    [[[
      const a = (entity && entity.attributes) || {};
      const active = variables.check === 'attrib'
        ? a[variables.attrib] === variables.value
        : entity && entity.state === variables.value;
      const mode = variables.value;
      const color = mode === 'cool'
        ? 'var(--lg_color_climate_cool)'
        : mode === 'heat'
          ? 'var(--lg_color_climate_heat)'
          : 'var(--lg_color_text)';
      const glow = !active
        ? 'none'
        : mode === 'cool'
          ? 'var(--lg_glow_climate_cool)'
          : mode === 'heat'
            ? 'var(--lg_glow_climate_heat)'
            : 'var(--lg_glow_climate_other)';
      const iconFilter = !active
        ? 'none'
        : mode === 'cool'
          ? 'var(--lg_filter_climate_cool)'
          : mode === 'heat'
            ? 'var(--lg_filter_climate_heat)'
            : 'var(--lg_filter_climate_other)';
      /* Arc placement — sweep angle from the inherited theme tokens (read via
         getComputedStyle so the JS stays in sync with the CSS token SoT,
         no hardcoded/guessed degrees). Side-specific pair (arc_side =
         'left' for the HVAC dial, 'right' for the fan dial) tilts the fan-out
         toward whichever side of the central setpoint circle the dial sits
         on; unset/unknown arc_side falls back to the original centered pair. */
      const idx = Number(variables.arc_index) || 0;
      const total = Math.max(1, Number(variables.arc_total) || 1);
      const cs = getComputedStyle(this);
      const side = variables.arc_side === 'left' || variables.arc_side === 'right' ? variables.arc_side : '';
      const startVar = side ? `--lg_climate_arc_sweep_start_deg_${side}` : '--lg_climate_arc_sweep_start_deg';
      const endVar = side ? `--lg_climate_arc_sweep_end_deg_${side}` : '--lg_climate_arc_sweep_end_deg';
      const startDeg = parseFloat(cs.getPropertyValue(startVar)) || -30;
      const endDeg = parseFloat(cs.getPropertyValue(endVar)) || -150;
      const angleDeg = total > 1 ? startDeg + (endDeg - startDeg) * (idx / (total - 1)) : startDeg;
      const rad = angleDeg * Math.PI / 180;
      const cosV = Math.cos(rad).toFixed(4);
      const sinV = Math.sin(rad).toFixed(4);
      const delay = `calc(${idx} * var(--lg_climate_arc_stagger_step))`;
      return `
    :host {
      position: absolute;
      width: var(--lg_size_climate_arc_option_w);
      height: var(--lg_size_climate_arc_option_w);
      aspect-ratio: 1;
      display: block;
      box-sizing: border-box;
      background: transparent !important;
      box-shadow: none !important;
      overflow: visible;
      cursor: pointer;
      pointer-events: auto;
      transform:
        translate(
          calc(var(--lg_arc_t, 0) * ${cosV} * var(--lg_size_climate_arc_radius)),
          calc(var(--lg_arc_t, 0) * ${sinV} * var(--lg_size_climate_arc_radius))
        )
        scale(var(--lg_arc_t, 0));
      opacity: var(--lg_arc_t, 0);
      /* Liquid-Glass "emerge from one drop": each pill arrives frosted and
         sharpens as it settles (t: 0 -> 1). Pairs with the bounce+stagger. */
      filter: blur(calc((1 - var(--lg_arc_t, 0)) * var(--lg_climate_arc_emerge_blur)));
      transition: var(--lg_arc_transition, var(--lg_transition_climate_arc_collapse)), opacity var(--lg_transition_climate_arc_collapse);
      transition-delay: ${delay};
      z-index: 42;
    }
    @media (max-width: 48rem) {
      :host {
        width: var(--lg_size_climate_arc_option_w_phone);
        height: var(--lg_size_climate_arc_option_w_phone);
        transform:
          translate(
            calc(var(--lg_arc_t, 0) * ${cosV} * var(--lg_size_climate_arc_radius_phone)),
            calc(var(--lg_arc_t, 0) * ${sinV} * var(--lg_size_climate_arc_radius_phone))
          )
          scale(var(--lg_arc_t, 0));
      }
    }
    ha-card, #card {
      background: transparent !important;
      box-shadow: none !important;
    }
    #card {
      position: relative;
      width: 100%;
      height: 100%;
      aspect-ratio: 1;
      box-sizing: border-box;
      border-radius: 50%;
      overflow: hidden;
      border: var(--lg_stroke_climate_arc_glass) solid var(--lg_color_climate_arc_glass_stroke);
      box-shadow: ${active ? glow : 'var(--lg_shadow_climate_arc_sphere)'};
      transition: var(--lg_transition_press);
      cursor: pointer;
    }
    #card:active {
      transform: var(--lg_transform_climate_press_scale);
      opacity: var(--lg_opacity_climate_press);
      filter: var(--lg_filter_climate_press);
    }
    #container {
      display: grid !important;
      place-items: center !important;
      width: 100%;
      height: 100%;
    }
    #liquid_clip {
      /* Per-option sphere glass — #arc_backdrop removed; each atom owns its
         own frost so options read as independent balls on the viewport scrim. */
      position: absolute;
      inset: 0;
      border-radius: 50%;
      overflow: hidden;
      background: var(--lg_color_climate_arc_glass_fill);
      backdrop-filter: blur(var(--lg_blur_climate_arc_glass)) saturate(var(--lg_saturate_glass));
      -webkit-backdrop-filter: blur(var(--lg_blur_climate_arc_glass)) saturate(var(--lg_saturate_glass));
      pointer-events: none;
      z-index: 0;
    }
    #img-cell {
      width: 100% !important;
      height: 100% !important;
      max-width: 100% !important;
      max-height: 100% !important;
      overflow: visible !important;
    }
    #icon {
      position: relative;
      z-index: 1;
      color: ${active ? color : 'var(--lg_color_text)'} !important;
      filter: ${iconFilter};
      /* Icons stay fully visible whenever the ring is open — active/inactive
         is communicated by color + glow only, never by dimming opacity. */
      opacity: 1;
      width: var(--lg_size_climate_chip_icon);
      height: var(--lg_size_climate_chip_icon);
      --mdc-icon-size: var(--lg_size_climate_chip_icon);
    }
    #img-cell {
      display: flex !important;
      align-items: center !important;
      justify-content: center !important;
      place-self: center !important;
      margin: 0 !important;
      padding: 0 !important;
      box-sizing: border-box !important;
    }
    #icon,
    #icon ha-icon,
    #icon ha-svg-icon {
      display: flex !important;
      align-items: center !important;
      justify-content: center !important;
      place-content: center !important;
      place-items: center !important;
      line-height: 0 !important;
      margin: 0 !important;
      padding: 0 !important;
    }
    #icon {
      transform: translateY(var(--lg_space_icon_optical_nudge));
    }
    #icon ha-svg-icon svg {
      display: block !important;
      margin: 0 auto !important;
    }
    #name, #label, #state { display: none !important; }
      `;
    ]]]
  custom_fields:
    liquid_clip: ""

# Swing axis toggle (vertical | horizontal). HA climate.set_swing_mode is set-not-toggle;
# UI computes next mode. Independent swing_horizontal_modes → set_swing_horizontal_mode.
# Fan/HVAC chips must NOT use this template.
climate_swing_axis_chip:
  show_name: false
  show_icon: true
  show_state: false
  show_ripple: false
  variables:
    axis: vertical
  tap_action:
    action: call-service
    service: |
      [[[
        const axis = variables.axis || 'vertical';
        const a = (entity && entity.attributes) || {};
        const hModes = a.swing_horizontal_modes;
        if (axis === 'horizontal' && Array.isArray(hModes) && hModes.length) {
          return 'climate.set_swing_horizontal_mode';
        }
        return 'climate.set_swing_mode';
      ]]]
    target:
      entity_id: "[[[ return (entity && entity.entity_id) || '' ]]]"
    data: |
      [[[
        const axis = variables.axis || 'vertical';
        const a = (entity && entity.attributes) || {};
        const modes = Array.isArray(a.swing_modes) ? a.swing_modes : [];
        const hModes = Array.isArray(a.swing_horizontal_modes)
          ? a.swing_horizontal_modes
          : null;
        const pick = (list, cands) => {
          const lower = (list || []).map((m) => String(m).toLowerCase());
          for (const c of cands) {
            const i = lower.indexOf(String(c).toLowerCase());
            if (i >= 0) return list[i];
          }
          return null;
        };
        const axisOn = (mode, ax) => {
          const m = String(mode || '').toLowerCase();
          if (ax === 'vertical') {
            return m === 'vertical' || m === 'both' || m === 'on';
          }
          return m === 'horizontal' || m === 'both';
        };
        /* Independent horizontal feature (HA ClimateEntityFeature.SWING_HORIZONTAL_MODE). */
        if (axis === 'horizontal' && hModes && hModes.length) {
          const curH = a.swing_horizontal_mode;
          const on = String(curH || '').toLowerCase() !== 'off' && !!curH;
          const next = on
            ? pick(hModes, ['off'])
            : pick(hModes, ['on', 'horizontal']);
          if (!next) return { swing_horizontal_mode: curH };
          return { swing_horizontal_mode: next };
        }
        if (axis === 'vertical' && hModes && hModes.length) {
          const cur = a.swing_mode;
          const on = axisOn(cur, 'vertical');
          const next = on
            ? pick(modes, ['off'])
            : pick(modes, ['vertical', 'on']);
          if (!next) return { swing_mode: cur };
          return { swing_mode: next };
        }
        /* Combined swing_modes: off | vertical | horizontal | both. */
        const cur = a.swing_mode;
        let wantVert = axisOn(cur, 'vertical');
        let wantHoriz = axisOn(cur, 'horizontal');
        if (axis === 'vertical') wantVert = !wantVert;
        else wantHoriz = !wantHoriz;
        let target = null;
        if (!wantVert && !wantHoriz) target = pick(modes, ['off']);
        else if (wantVert && !wantHoriz) target = pick(modes, ['vertical', 'on']);
        else if (!wantVert && wantHoriz) target = pick(modes, ['horizontal']);
        else target = pick(modes, ['both']);
        if (!target) return { swing_mode: cur };
        return { swing_mode: target };
      ]]]
  extra_styles: |
    [[[
      const axis = variables.axis || 'vertical';
      const a = (entity && entity.attributes) || {};
      const modes = Array.isArray(a.swing_modes) ? a.swing_modes : [];
      const hModes = Array.isArray(a.swing_horizontal_modes)
        ? a.swing_horizontal_modes
        : null;
      const axisOn = (mode, ax) => {
        const m = String(mode || '').toLowerCase();
        if (ax === 'vertical') {
          return m === 'vertical' || m === 'both' || m === 'on';
        }
        return m === 'horizontal' || m === 'both';
      };
      let supported = true;
      if (axis === 'horizontal') {
        supported = !!(hModes && hModes.length)
          || modes.some((m) => /^(horizontal|both)$/i.test(String(m)));
      } else {
        supported = modes.some((m) => /^(vertical|both|on|off)$/i.test(String(m)))
          || modes.length === 0;
      }
      let active = false;
      if (axis === 'horizontal' && hModes && hModes.length) {
        const curH = a.swing_horizontal_mode;
        active = String(curH || '').toLowerCase() !== 'off' && !!curH;
      } else {
        active = axisOn(a.swing_mode, axis);
      }
      const frost = active
        ? 'var(--lg_color_climate_frost_other)'
        : 'var(--lg_color_liquid_frost)';
      const clipBg = `${frost}, var(--lg_color_liquid_base)`;
      const glow = active ? 'var(--lg_glow_climate_other)' : 'none';
      const clipShadow = active
        ? `var(--lg_shadow_liquid), ${glow}`
        : 'var(--lg_shadow_liquid)';
      return `
    :host {
      width: var(--lg_size_climate_satellite_w) !important;
      height: var(--lg_size_climate_satellite_w) !important;
      max-width: var(--lg_size_climate_satellite_w) !important;
      aspect-ratio: 1 !important;
      display: ${supported ? 'block' : 'none'} !important;
      box-sizing: border-box;
      background: transparent !important;
      box-shadow: none !important;
      overflow: visible !important;
    }
    @media (max-width: 48rem) {
      :host {
        width: var(--lg_size_climate_satellite_w_phone) !important;
        height: var(--lg_size_climate_satellite_w_phone) !important;
        max-width: var(--lg_size_climate_satellite_w_phone) !important;
      }
    }
    ha-card, #card {
      background: transparent !important;
      box-shadow: none !important;
      overflow: visible !important;
    }
    #card {
      position: relative;
      width: 100%;
      height: 100%;
      aspect-ratio: 1;
      border-radius: 50%;
      box-sizing: border-box;
      display: ${supported ? 'block' : 'none'};
      margin: 0 auto;
      cursor: pointer;
      overflow: hidden;
      border: var(--lg_stroke_climate_arc_glass) solid var(--lg_color_climate_arc_glass_stroke);
      transition: var(--lg_transition_press);
    }
    #card:active {
      transform: var(--lg_transform_climate_press_scale);
      opacity: var(--lg_opacity_climate_press);
      filter: var(--lg_filter_climate_press);
    }
    #container {
      display: grid !important;
      place-items: center !important;
      width: 100%;
      height: 100%;
    }
    #liquid_clip {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      overflow: hidden;
      background: ${clipBg};
      background-blend-mode: normal, plus-lighter;
      backdrop-filter: blur(var(--lg_blur_liquid)) saturate(var(--lg_saturate_glass));
      -webkit-backdrop-filter: blur(var(--lg_blur_liquid)) saturate(var(--lg_saturate_glass));
      box-shadow: ${clipShadow};
      pointer-events: none;
      z-index: 0;
    }
    #img-cell {
      width: 100% !important;
      height: 100% !important;
      max-width: 100% !important;
      max-height: 100% !important;
      overflow: visible !important;
    }
    #icon {
      position: relative;
      z-index: 1;
      width: var(--lg_size_climate_satellite_icon);
      height: var(--lg_size_climate_satellite_icon);
      max-width: var(--lg_size_climate_satellite_icon);
      max-height: var(--lg_size_climate_satellite_icon);
      --mdc-icon-size: var(--lg_size_climate_satellite_icon);
      color: var(--lg_color_text) !important;
      filter: ${active ? 'var(--lg_filter_climate_other)' : 'none'};
      opacity: ${active ? '1' : '0.72'};
    }
    @media (max-width: 48rem) {
      #icon {
        width: var(--lg_size_climate_satellite_icon_phone);
        height: var(--lg_size_climate_satellite_icon_phone);
        max-width: var(--lg_size_climate_satellite_icon_phone);
        max-height: var(--lg_size_climate_satellite_icon_phone);
        --mdc-icon-size: var(--lg_size_climate_satellite_icon_phone);
      }
    }
    #img-cell {
      display: flex !important;
      align-items: center !important;
      justify-content: center !important;
      place-self: center !important;
      margin: 0 !important;
      padding: 0 !important;
      box-sizing: border-box !important;
    }
    #icon,
    #icon ha-icon,
    #icon ha-svg-icon {
      display: flex !important;
      align-items: center !important;
      justify-content: center !important;
      place-content: center !important;
      place-items: center !important;
      line-height: 0 !important;
      margin: 0 !important;
      padding: 0 !important;
    }
    #icon {
      transform: translateY(var(--lg_space_icon_optical_nudge));
    }
    #icon ha-svg-icon svg {
      display: block !important;
      margin: 0 auto !important;
    }
    #name, #label, #state { display: none !important; }
      `;
    ]]]
  custom_fields:
    liquid_clip: >
      <div class="lg-liquid-clip-shell"></div>

# Small icon-only satellite chip — shared base for the AIC "solar system"
# controls that orbit the sun (climate_setpoint_trigger): Turbo, Quiet
# (climate_swing_axis_chip keeps its own bespoke multi-state styling but
# matches this same size/shape). Deliberately smaller than
# lg_size_climate_arc_trigger_w and never shows a text label. Generic
# optional gate (variables.gate_entity_id / .gate_states): when set, the
# chip reads a SEPARATE entity's state (e.g. the parent climate.* entity)
# and disables itself (pointer-events:none + dimmed) unless that entity's
# state is one of gate_states — used by climate_turbo_btn's "active only
# in heat/cool" requirement without hardcoding the climate entity id here.
climate_satellite_chip:
  show_icon: true
  show_name: false
  show_state: false
  show_label: false
  show_ripple: false
  variables:
    gate_entity_id: ""
    gate_states: []
  extra_styles: |
    [[[
      const on = entity && entity.state === 'on';
      const gateId = variables && variables.gate_entity_id;
      const gateStates = (variables && variables.gate_states) || [];
      let gated = false;
