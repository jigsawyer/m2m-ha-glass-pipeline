climate_wheel_swing_btn:
  show_name: false
  show_icon: true
  show_state: false
  show_ripple: false
  variables:
    axis: vertical
    seg_index: 4
    seg_total: 6
  tap_action:
    action: call-service
    service: |
      [[[
        const axis = variables.axis || 'vertical';
        const a = (entity && entity.attributes) || {};
        const hModes = a.swing_horizontal_modes;
        if (axis === 'horizontal' && Array.isArray(hModes) && hModes.length) {
          return 'climate.set_swing_horizontal_mode';
        }
        return 'climate.set_swing_mode';
      ]]]
    target:
      entity_id: "[[[ return (entity && entity.entity_id) || '' ]]]"
    data: |
      [[[
        const axis = variables.axis || 'vertical';
        const a = (entity && entity.attributes) || {};
        const modes = Array.isArray(a.swing_modes) ? a.swing_modes : [];
        const hModes = Array.isArray(a.swing_horizontal_modes)
          ? a.swing_horizontal_modes
          : null;
        const pick = (list, cands) => {
          const lower = (list || []).map((m) => String(m).toLowerCase());
          for (const c of cands) {
            const i = lower.indexOf(String(c).toLowerCase());
            if (i >= 0) return list[i];
          }
          return null;
        };
        const axisOn = (mode, ax) => {
          const m = String(mode || '').toLowerCase();
          if (ax === 'vertical') {
            return m === 'vertical' || m === 'both' || m === 'on';
          }
          return m === 'horizontal' || m === 'both';
        };
        if (axis === 'horizontal' && hModes && hModes.length) {
          const curH = a.swing_horizontal_mode;
          const on = String(curH || '').toLowerCase() !== 'off' && !!curH;
          const next = on
            ? pick(hModes, ['off'])
            : pick(hModes, ['on', 'horizontal']);
          if (!next) return { swing_horizontal_mode: curH };
          return { swing_horizontal_mode: next };
        }
        if (axis === 'vertical' && hModes && hModes.length) {
          const cur = a.swing_mode;
          const on = axisOn(cur, 'vertical');
          const next = on
            ? pick(modes, ['off'])
            : pick(modes, ['vertical', 'on']);
          if (!next) return { swing_mode: cur };
          return { swing_mode: next };
        }
        const cur = a.swing_mode;
        let wantVert = axisOn(cur, 'vertical');
        let wantHoriz = axisOn(cur, 'horizontal');
        if (axis === 'vertical') wantVert = !wantVert;
        else wantHoriz = !wantHoriz;
        let target = null;
        if (!wantVert && !wantHoriz) target = pick(modes, ['off']);
        else if (wantVert && !wantHoriz) target = pick(modes, ['vertical', 'on']);
        else if (!wantVert && wantHoriz) target = pick(modes, ['horizontal']);
        else target = pick(modes, ['both']);
        if (!target) return { swing_mode: cur };
        return { swing_mode: target };
      ]]]
  icon: |
    [[[
      return (variables.axis === 'horizontal') ? 'mdi:arrow-left-right' : 'mdi:arrow-up-down';
    ]]]
  extra_styles: |
    [[[
      const __lgSegIdx = Number(variables.seg_index);
      const __lgSegTotal = Math.max(1, Number(variables.seg_total) || 6);
      const __lgSegSpan = 360 / __lgSegTotal;
      const __lgSegRot = (Number.isFinite(__lgSegIdx) ? __lgSegIdx : 0) * __lgSegSpan;
      /* Radial stops are % of closest-side (= half box) → box-% radii * 0.5 */
      const __lgInnerR = 19;
      const __lgOuterR = 24.75;
      const __lgClipPts = (() => {
        const pts = [];
        const steps = 14;
        const a0 = (-0.5 * __lgSegSpan) * Math.PI / 180;
        const a1 = (0.5 * __lgSegSpan) * Math.PI / 180;
        for (let i = 0; i <= steps; i++) {
          const t = a0 + (a1 - a0) * (i / steps);
          pts.push((50 + __lgOuterR * Math.sin(t)).toFixed(3) + '% ' + (50 - __lgOuterR * Math.cos(t)).toFixed(3) + '%');
        }
        for (let i = steps; i >= 0; i--) {
          const t = a0 + (a1 - a0) * (i / steps);
          pts.push((50 + __lgInnerR * Math.sin(t)).toFixed(3) + '% ' + (50 - __lgInnerR * Math.cos(t)).toFixed(3) + '%');
        }
        return pts.join(',');
      })();
      const axis = variables.axis || 'vertical';
      const a = (entity && entity.attributes) || {};
      const modes = Array.isArray(a.swing_modes) ? a.swing_modes : [];
      const hModes = Array.isArray(a.swing_horizontal_modes)
        ? a.swing_horizontal_modes
        : null;
      const axisOn = (mode, ax) => {
        const m = String(mode || '').toLowerCase();
        if (ax === 'vertical') {
