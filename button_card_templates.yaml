# LiquidThermostatControl "ControlArc" ring panel — AUTHORIZED custom radial
# control (analyzer.mdc §6, revised: in-place, no popup — nested as a
# ring_overlay custom_field directly inside climate_setpoint_trigger, which
# owns the expand/collapse toggle): a compact "horseshoe" SVG arc (gap
# centered at the bottom, sweep from lg_size_climate_ring_sweep_deg) around a
# central approve button, with a draggable circular thumb riding the fill's
# leading edge. DEFERRED COMMIT — pointer drag on #ring updates a client-side pending
# value (host.__lgRingPending), the ring fill (--lg_ring_t), the thumb
# position (--lg_ring_thumb_x/_y) and the pending label ONLY.
# climate.set_temperature is called exactly once, from the central
# climate_thermostat_action_btn (#action_btn) on approve-click. min_temp /
# max_temp / target_temp_step / temperature are read LIVE from the entity — no
# proxy input_number helper, no guessed hardware bounds. Pointer listeners are
# pointerdown/move/up/cancel only (never touchstart) + touch-action:none on
# #ring, so the passive-listener console noise from the retired
# slider-button-card dome cannot recur.
#
# Arc geometry (SoT — do not re-derive by guesswork, see the math below):
# the SVG is CSS-rotated -90deg so path-percent p=0 renders at 12 o'clock,
# increasing clockwise (p=25 -> 3 o'clock, p=50 -> 6 o'clock, p=75 -> 9
# o'clock). Gap is centered at p=50 (6 o'clock). For sweepDeg degrees of
# visible arc: gapPct = (360-sweepDeg)/360*100; onLen = 100-gapPct;
# onStart = 50 + gapPct/2 (the p-value where the visible arc/fill begins,
# i.e. the MIN-temp edge, bottom-left of the gap). Both track and fill use a
# 2-value stroke-dasharray [on, off] summing to exactly 100 (one pathLength
# cycle == one revolution) with a constant stroke-dashoffset of
# (100 - onStart), which places the "on" run's start exactly at onStart.
# Track's "on" length is the constant onLen (full horseshoe). Fill's "on"
# length is the live var(--lg_ring_t) * onLen (grows from onStart through
# 12 o'clock toward the MAX-temp edge at p = (onStart+onLen) mod 100,
# bottom-right of the gap) — dragging clockwise raises the temperature.
# Thumb position mirrors the fill's leading edge via
# x% = 50 + 44*sin(theta), y% = 50 - 44*cos(theta), theta = p/100*2*PI
# (exact inverse of the -90deg CSS rotation applied to the ring SVG).
climate_thermostat_ring_panel:
  show_icon: false
  show_name: false
  show_state: false
  show_label: false
  show_ripple: false
  tap_action:
    action: none
  extra_styles: |
    [[[
      const mode = entity ? entity.state : 'off';
      const attrs = (entity && entity.attributes) || {};
      const tempEnabled = mode === 'heat' || mode === 'cool';
      const tempPointer = tempEnabled ? 'auto' : 'none';
      const tempOpacity = tempEnabled ? '1' : 'var(--lg_opacity_climate_ring_readonly)';
      const fillColor = mode === 'cool'
        ? 'var(--lg_color_climate_cc_fill_cool)'
        : mode === 'heat'
          ? 'var(--lg_color_climate_cc_fill_heat)'
          : 'var(--lg_color_climate_ring_fill)';
      const minT = Number(attrs.min_temp);
      const maxT = Number(attrs.max_temp);
      const stepT = Number(attrs.target_temp_step) || 1;
      const setT = Number(attrs.temperature);
      const span = (Number.isFinite(minT) && Number.isFinite(maxT) && maxT > minT) ? (maxT - minT) : 0;
      const tol = (stepT / 2) || 0.05;
      const fracFromTemp = (t) => (!(span > 0) || !Number.isFinite(t)) ? 0 : Math.max(0, Math.min(1, (t - minT) / span));

      /* Sweep/gap geometry — sole source of truth is the
         lg_size_climate_ring_sweep_deg token (read live, never duplicated
         as a bare literal here). See the SoT comment above the template. */
      const R = 44, CX = 50, CY = 50;
      let sweepDeg = 250;
      if (this) {
        const raw = parseFloat(getComputedStyle(this).getPropertyValue('--lg_size_climate_ring_sweep_deg'));
        if (Number.isFinite(raw) && raw > 0 && raw <= 360) sweepDeg = raw;
      }
      const r4 = (n) => Math.round(n * 10000) / 10000;
      const gapPct = r4(Math.max(0, Math.min(100, (360 - sweepDeg) / 360 * 100)));
      const onLen = r4(100 - gapPct);
      const onStart = r4(50 + gapPct / 2);
      const dashOffsetBase = r4(100 - onStart);
      const posForPercent = (p) => {
        const theta = (p / 100) * Math.PI * 2;
        return { x: r4(CX + R * Math.sin(theta)), y: r4(CY - R * Math.cos(theta)) };
      };

      /* Clear stale pending once HA has caught up to (or past) it. */
      if (this && typeof this.__lgRingPending === 'number' && Number.isFinite(setT)
          && Math.abs(this.__lgRingPending - setT) < tol) {
        this.__lgRingPending = undefined;
      }
      const pendingNow = (this && typeof this.__lgRingPending === 'number' && Number.isFinite(this.__lgRingPending))
        ? this.__lgRingPending : null;
      /* Idle (no pending) always resyncs from the entity — this is the "seed
         on open" + "revert on dismiss" behaviour: nothing is stored server-side
         until approve, and a fresh render with no pending mirrors HA. */
      const displayTemp = pendingNow !== null ? pendingNow : (Number.isFinite(setT) ? setT : null);
      const ringT = pendingNow !== null ? fracFromTemp(pendingNow) : fracFromTemp(setT);
      const thumbPos = posForPercent(onStart + ringT * onLen);
      const pendingLabel = displayTemp !== null ? `"${displayTemp}°"` : '"—"';
      const isPending = pendingNow !== null && Number.isFinite(setT) && Math.abs(pendingNow - setT) >= tol;
      const actionShadow = isPending ? 'var(--lg_shadow_climate_thermostat_action_pending)' : 'var(--lg_shadow_liquid)';
      const actionColor = isPending ? 'var(--lg_color_climate_thermostat_pending_green)' : 'var(--lg_color_text)';
      if (this) {
        this.classList.add('lg-ring-host');
        this.__lgRingRange = { min: minT, max: maxT, step: stepT, span, mode, setT };
        this.__lgRingGeo = { onStart, onLen };
      }
      if (this && this.updateComplete) {
        const card = this;
        const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));
        const setVar = (n, v) => {
          const cur = card.style.getPropertyValue(n);
          if (v === null || v === undefined || v === '') { if (cur) card.style.removeProperty(n); return; }
          if (cur !== v) card.style.setProperty(n, v);
        };
        const applyFraction = (frac) => {
          const r = card.__lgRingRange || {};
          const geo = card.__lgRingGeo || { onStart, onLen };
          if (!(r.span > 0) || !Number.isFinite(r.min)) return;
          let temp = r.min + frac * r.span;
          temp = Math.round(temp / r.step) * r.step;
          temp = clamp(Math.round(temp * 10) / 10, r.min, r.max);
          const snap = clamp((temp - r.min) / r.span, 0, 1);
          card.__lgRingPending = temp;
          const pos = posForPercent(geo.onStart + snap * geo.onLen);
          setVar('--lg_ring_t', String(snap));
          setVar('--lg_ring_thumb_x', `${pos.x}%`);
          setVar('--lg_ring_thumb_y', `${pos.y}%`);
          setVar('--lg_climate_pending_label', `"${temp}°"`);
          const changed = Number.isFinite(r.setT) && Math.abs(temp - r.setT) >= ((r.step / 2) || 0.05);
          setVar('--lg_climate_action_shadow', changed
            ? 'var(--lg_shadow_climate_thermostat_action_pending)'
            : 'var(--lg_shadow_liquid)');
          setVar('--lg_climate_action_color', changed
            ? 'var(--lg_color_climate_thermostat_pending_green)'
            : 'var(--lg_color_text)');
        };
        const fractionFromEvent = (ev, ringEl) => {
          const rect = ringEl.getBoundingClientRect();
          const cx = rect.left + rect.width / 2;
          const cy = rect.top + rect.height / 2;
          /* visual angle measured from 12 o'clock, clockwise, normalised to
             the same 0..100 "p" space as the arc geometry above */
          let a = Math.atan2(ev.clientX - cx, -(ev.clientY - cy));
          if (a < 0) a += Math.PI * 2;
          const p = (a / (Math.PI * 2)) * 100;
          const geo = card.__lgRingGeo || { onStart, onLen };
          const rel = ((p - geo.onStart) % 100 + 100) % 100;
          if (rel <= geo.onLen) return rel / geo.onLen;
          /* Pointer fell inside the bottom gap (dead zone) — clamp to
             whichever visible edge (min/max) it is nearer to. */
          const gapLen = 100 - geo.onLen;
          const gapMid = geo.onLen + gapLen / 2;
          return rel <= gapMid ? 1 : 0;
        };
        if (!card.__lgRingBound) {
          const bind = () => {
            const ring = card.shadowRoot && card.shadowRoot.querySelector('#ring');
            if (!ring || card.__lgRingBound) return;
            card.__lgRingBound = true;
            const down = (ev) => {
              const r = card.__lgRingRange || {};
              if (r.mode !== 'heat' && r.mode !== 'cool') return;
              card.__lgRingDragging = true;
              if (ring.setPointerCapture && ev.pointerId !== undefined) {
                try { ring.setPointerCapture(ev.pointerId); } catch (e) {}
              }
              applyFraction(fractionFromEvent(ev, ring));
              ev.preventDefault();
            };
            const move = (ev) => {
              if (!card.__lgRingDragging) return;
              applyFraction(fractionFromEvent(ev, ring));
              ev.preventDefault();
            };
            const up = () => { card.__lgRingDragging = false; };
            ring.addEventListener('pointerdown', down);
            ring.addEventListener('pointermove', move);
            ring.addEventListener('pointerup', up);
            ring.addEventListener('pointercancel', up);
          };
          card.updateComplete.then(() => { bind(); setTimeout(bind, 60); setTimeout(bind, 240); });
        }
      }
      return `
    :host {
      width: 100% !important;
      max-width: 100% !important;
      min-width: 0 !important;
      display: flex !important;
      flex-direction: column !important;
      align-items: center !important;
      justify-content: center !important;
      box-sizing: border-box;
      overflow: visible !important;
      background: transparent !important;
      box-shadow: none !important;
      --lg_ring_t: ${ringT};
      --lg_ring_thumb_x: ${thumbPos.x}%;
      --lg_ring_thumb_y: ${thumbPos.y}%;
      --lg_climate_ring_fill_color: ${fillColor};
      --lg_climate_pending_label: ${pendingLabel};
      --lg_climate_action_shadow: ${actionShadow};
      --lg_climate_action_color: ${actionColor};
    }
    ha-card {
      width: 100% !important;
      display: flex !important;
      flex-direction: column !important;
      align-items: center !important;
      background: transparent !important;
      box-shadow: none !important;
      overflow: visible !important;
    }
    #card {
      background: transparent !important;
      box-shadow: none !important;
      overflow: visible !important;
    }
    #container {
      display: grid !important;
      place-items: center !important;
      width: var(--lg_size_climate_ring_w) !important;
      height: var(--lg_size_climate_ring_w) !important;
      box-sizing: border-box !important;
      position: relative !important;
    }
    #name, #icon, #label, #state { display: none !important; }
    #ring {
      grid-area: 1 / 1 !important;
      width: var(--lg_size_climate_ring_w) !important;
      height: var(--lg_size_climate_ring_w) !important;
      aspect-ratio: 1 / 1 !important;
      display: block !important;
      position: relative !important;
      box-sizing: border-box !important;
      border-radius: 50% !important;
      pointer-events: ${tempPointer} !important;
      opacity: ${tempOpacity};
      touch-action: none !important;
      z-index: 0 !important;
    }
    #ring .lg-ring__svg {
      width: 100% !important;
      height: 100% !important;
      display: block !important;
      overflow: visible !important;
      pointer-events: none !important;
      transform: rotate(-90deg);
      transform-origin: 50% 50%;
    }
    #ring .lg-ring__track {
      fill: none;
      stroke: var(--lg_color_climate_ring_track);
      stroke-width: var(--lg_size_climate_ring_stroke_u);
      stroke-linecap: round;
      stroke-dasharray: ${onLen} ${gapPct};
      stroke-dashoffset: ${dashOffsetBase};
    }
    #ring .lg-ring__fill {
      fill: none;
      stroke: var(--lg_climate_ring_fill_color, var(--lg_color_climate_ring_fill));
      stroke-width: var(--lg_size_climate_ring_stroke_u);
      stroke-linecap: round;
      stroke-dasharray: calc(var(--lg_ring_t, 0) * ${onLen}) calc(100 - (var(--lg_ring_t, 0) * ${onLen}));
      stroke-dashoffset: ${dashOffsetBase};
      transition: var(--lg_transition_climate_ring_fill);
    }
    #action_btn {
      grid-area: 1 / 1 !important;
      z-index: 2 !important;
      justify-self: center !important;
      align-self: center !important;
    }
    #thumb {
      grid-area: 1 / 1 !important;
      z-index: 3 !important;
      position: absolute !important;
      left: var(--lg_ring_thumb_x) !important;
      top: var(--lg_ring_thumb_y) !important;
      width: var(--lg_size_climate_ring_thumb_d) !important;
      height: var(--lg_size_climate_ring_thumb_d) !important;
      border-radius: 50% !important;
      background: var(--lg_color_climate_ring_thumb) !important;
      box-shadow: var(--lg_shadow_climate_ring_thumb) !important;
      pointer-events: none !important;
      opacity: ${tempOpacity};
      transition: var(--lg_transition_climate_ring_thumb);
      transform: translate(-50%, -50%) !important;
    }
    @media (max-width: 48rem) {
      #container, #ring {
        width: var(--lg_size_climate_ring_w_phone) !important;
        height: var(--lg_size_climate_ring_w_phone) !important;
      }
      #ring .lg-ring__track, #ring .lg-ring__fill {
        stroke-width: var(--lg_size_climate_ring_stroke_u_phone);
      }
      #thumb {
        width: var(--lg_size_climate_ring_thumb_d_phone) !important;
        height: var(--lg_size_climate_ring_thumb_d_phone) !important;
      }
    }
      `;
    ]]]
  custom_fields:
    ring: >
      <svg class="lg-ring__svg" viewBox="0 0 100 100" preserveAspectRatio="xMidYMid meet" aria-hidden="true">
        <circle class="lg-ring__track" cx="50" cy="50" r="44" pathLength="100"></circle>
