    [[[
      const clampInt = (n, lo, hi) => Math.min(hi, Math.max(lo, n));
      const pad2 = (n) => String(n).padStart(2, '0');
      const parseHHMM = (state) => {
        if (!state || state === 'unknown' || state === 'unavailable') return [0, 0];
        const parts = String(state).split(':');
