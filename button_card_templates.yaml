climate_wheel_temp_frost:
  show_icon: false
  show_name: false
  show_state: false
  show_label: false
  show_ripple: false
  tap_action: |
    [[[
      const composedParent = (el) => {
        if (!el) return null;
        if (el.parentElement) return el.parentElement;
        const rn = el.getRootNode && el.getRootNode();
        return (rn && rn.host) || null;
      };
      let wheelHost = null;
      let scope = composedParent(this);
      for (let i = 0; i < 16 && scope; i++) {
        if (scope.classList && scope.classList.contains('lg-wheel-host')) {
          wheelHost = scope;
          break;
        }
        scope = composedParent(scope);
      }
      /* Ignore a dismiss tap landing in the SAME gesture that opened TEMP —
         open and this catcher's tap can both resolve inside one click
         cycle. Time-based debounce (fixed root cause) replaces the old
         "wait for an unrelated future document pointerup to arm" hack: that
         deferred arming indefinitely if no other pointerup ever occurred
         elsewhere on the page, leaving the ring perpetually unopened and
         the wheel segments (hidden while .lg-wheel-temp-open) perpetually
         hidden — analyzer.mdc §6/§6b Symptom A/B root cause. */
      const openedAt = wheelHost && wheelHost.__lgTempOpenedAt;
      if (!wheelHost || !wheelHost.classList.contains('lg-wheel-temp-open') || (Date.now() - (openedAt || 0)) < 250) {
        return { action: 'none' };
      }
      let triggerHost = null;
      if (wheelHost && wheelHost.shadowRoot) {
        triggerHost = wheelHost.shadowRoot.querySelector('.lg-ring-trigger-host.lg-ring-trigger-expanded')
          || wheelHost.shadowRoot.querySelector('.lg-ring-trigger-expanded');
      }
      if (!triggerHost) {
        scope = composedParent(this);
        for (let i = 0; i < 16 && scope; i++) {
          if (scope.classList && scope.classList.contains('lg-ring-trigger-host')) {
            triggerHost = scope;
            break;
          }
          scope = composedParent(scope);
        }
      }
      if (triggerHost) {
        triggerHost.classList.remove('lg-ring-trigger-expanded');
        if (wheelHost) {
          wheelHost.classList.remove('lg-wheel-temp-open');
          wheelHost.__lgTempOpenedAt = 0;
        }
        const ringHost = triggerHost.shadowRoot && triggerHost.shadowRoot.querySelector('.lg-ring-host');
        if (ringHost) {
          const r = ringHost.__lgRingRange || {};
          const geo = ringHost.__lgRingGeo || { onStart: 0, onLen: 100 };
          const snap = (Number.isFinite(r.setT) && r.span > 0)
            ? Math.max(0, Math.min(1, (r.setT - r.min) / r.span)) : 0;
          const theta = ((geo.onStart + snap * geo.onLen) / 100) * Math.PI * 2;
          const round4 = (n) => Math.round(n * 10000) / 10000;
          ringHost.__lgRingPending = undefined;
          ringHost.style.setProperty('--lg_ring_t', String(snap));
          ringHost.style.setProperty('--lg_ring_thumb_x', `${round4(50 + 44 * Math.sin(theta))}%`);
          ringHost.style.setProperty('--lg_ring_thumb_y', `${round4(50 - 44 * Math.cos(theta))}%`);
          ringHost.style.setProperty(
            '--lg_climate_pending_label',
            Number.isFinite(r.setT) ? `"${r.setT}\u00b0"` : '"\u2014"'
          );
          ringHost.style.setProperty('--lg_climate_action_shadow', 'var(--lg_shadow_liquid)');
          ringHost.style.setProperty('--lg_climate_action_color', 'var(--lg_color_text)');
        }
      }
      return { action: 'none' };
    ]]]
  extra_styles: |
    [[[
      return `
    /* Opacity/pointer gated by climate_global_wheel #temp_frost wrapper
       (:host(.lg-wheel-temp-open) #temp_frost, see climate_global_wheel) —
       keep this host fully painted so parent opacity is the single
       visibility switch (avoids nested opacity:0 fighting the open state). */
    :host {
      position: fixed !important;
      inset: 0 !important;
      display: block !important;
      width: 100vw !important;
      height: 100vh !important;
      max-width: 100vw !important;
      max-height: 100vh !important;
      background: var(--lg_color_climate_focus_viewport_fill) !important;
      backdrop-filter: blur(var(--lg_blur_climate_focus_viewport)) saturate(var(--lg_saturate_climate_focus_viewport));
      -webkit-backdrop-filter: blur(var(--lg_blur_climate_focus_viewport)) saturate(var(--lg_saturate_climate_focus_viewport));
      opacity: 1 !important;
      pointer-events: inherit !important;
      transition: opacity var(--lg_transition_climate_arc_overlay);
      box-shadow: none !important;
      overflow: hidden;
      z-index: 40 !important;
    }
    ha-card, #card, #container {
      background: transparent !important;
      box-shadow: none !important;
      width: 100%;
      height: 100%;
    }
    #icon, #name, #label, #state { display: none !important; }
      `;
    ]]]

