      background: var(--lg_color_disable_frost), var(--lg_color_liquid_base), var(--lg_color_liquid_burn_soft);
      background-blend-mode: normal, plus-lighter, color-burn;
      backdrop-filter: blur(var(--lg_blur_room_btn));
