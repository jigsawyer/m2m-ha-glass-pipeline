      };
      const card = this;
      const ha = card.hass;
      const clockEid = card.config && card.config.entity;
      const hourEid = variables.clock_hour_entity_id;
      const minuteEid = variables.clock_minute_entity_id;
      card.__lgClockHourEid = hourEid;
      card.__lgClockMinuteEid = minuteEid;
      card.__lgClockEid = clockEid;
