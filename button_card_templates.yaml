         inset-free content box. Phone-only: drop L/R floor pad so content box
         ≥ masonry phone width, then margin:auto the masonry track.
         Desktop keeps full inset padding (View Independence). */
      #content {
        align-items: center !important;
        justify-content: center !important;
        padding-top: var(--lg_space_floor_inset) !important;
        padding-bottom: var(--lg_space_floor_inset) !important;
        padding-left: 0 !important;
        padding-right: 0 !important;
      }
      /* Outer grid: full floor width — nested header + mosaic shells share one
         phone track. */
      #content > layout-card,
      #content > * {
        width: 100% !important;
        max-width: 100% !important;
        margin-left: 0 !important;
        margin-right: 0 !important;
        box-sizing: border-box !important;
        justify-self: stretch !important;
      }
      /* Header row (mic+disable flankers) nested layout-card lives in outer
         layout-card light DOM — styleable from here (not shadow-piercing).
         H-center it to phone room width so the AIC pair matches room midX.
         View Independence (analyzer.mdc §0d): climate_floor_container.yaml
         now renders [optional header, phone-track conditional, desktop-track
         conditional] — the header (when present) is always exactly the 3rd
         child from the end; when absent there are only 2 children and
         :nth-last-child(3) matches nothing. This scopes the rule to the
         header ONLY and never touches the masonry track entries — each
         masonry variant (phone/desktop) is self-sized via its own dedicated
         lg_masonry_climate_*_phone / _desktop literal; forcing this
         unrelated external width onto that box would re-create the very
         shared-constraint coupling bug this rule exists to prevent.
         Two selector forms hedge whether the plugin wraps each `cards:`
         entry in an extra light-DOM element or not (case-agnostic). */
      #content > layout-card > layout-card:nth-last-child(3),
      #content > layout-card > *:nth-last-child(3) layout-card {
        width: min(100%, var(--lg_size_climate_container_w_phone)) !important;
        max-width: min(100%, var(--lg_size_climate_container_w_phone)) !important;
        margin-left: auto !important;
        margin-right: auto !important;
        box-sizing: border-box !important;
        justify-self: center !important;
      }
      /* Masonry tracks = last two children (phone + desktop conditionals).
         Only one is visible; margin:auto centers the phone track in
         the unpadded floor content box. Do not rewrite masonry width literal. */
      #content > layout-card > *:nth-last-child(1),
      #content > layout-card > *:nth-last-child(2) {
        margin-left: auto !important;
        margin-right: auto !important;
        justify-self: center !important;
        box-sizing: border-box !important;
      }
    }

# Klimat rooms: desktop gap — layout-card zeros .column > * side margins when
# the card hits column_max_width. Reserve lg_space_floor_inset (= floor L/R/B
# pad = room bottom→parent distance) via half-inset L/R margins + max-width
# cap so width+margins fit the column (seam gap = floor_inset).
# View Independence (analyzer.mdc §0d): phone track is climate_floor_container's
# dedicated lg_masonry_climate_*_phone track (headroom over
# lg_size_climate_container_w_phone), sized independently of the desktop
# track — so true centering (not a left-align offset hack tied to a shared
# literal) is correct here. A prior left-align hack existed only because
# phone/desktop shared one masonry literal; that coupling is now removed.
climate_room_container:
  template: room_container
  extra_styles: |
    :host {
      display: block !important;
      width: min(100%, var(--lg_size_climate_container_w)) !important;
      max-width: min(
        100%,
        var(--lg_size_climate_container_w),
        calc(100% - var(--lg_space_floor_inset))
      ) !important;
      margin-left: calc(var(--lg_space_floor_inset) / 2) !important;
      margin-right: calc(var(--lg_space_floor_inset) / 2) !important;
      justify-self: center !important;
      box-sizing: border-box !important;
    }
    ha-card {
      width: 100% !important;
      max-width: 100% !important;
      margin-left: auto !important;
      margin-right: auto !important;
      box-sizing: border-box !important;
    }
    #card {
      margin-left: auto !important;
      margin-right: auto !important;
    }
    
    #card {
      position: relative;
      overflow: visible;
      box-sizing: border-box;
      width: min(100%, var(--lg_size_climate_container_w));
      max-width: min(100%, var(--lg_size_climate_container_w));
      min-width: 0;
      min-height: 0;
      height: auto;
      padding: 0;
      margin: 0;
      border: none;
      background: transparent;
      box-shadow: none;
      transition: var(--lg_transition_smooth);
      /* Layout shell — not a control; docs: tap_action none removes pointer (#1038) */
      cursor: default;
    }
    #container {
      display: grid !important;
      grid-template-areas: "room_title" "room_panel" !important;
      grid-template-columns: 1fr !important;
      grid-template-rows: min-content min-content !important;
      justify-items: center !important;
      align-content: start !important;
      width: 100% !important;
    }
    #name {
      grid-area: room_title !important;
      margin-bottom: var(--lg_space_room_title_gap);
    }
    #content,
    #glass_layers {
      grid-area: room_panel !important;
    }
    #content {
      position: relative;
      z-index: 2;
      padding: var(--lg_space_gap_md);
      border-radius: var(--lg_radius_room);
      border: var(--lg_stroke_glass) solid var(--lg_color_room_glass_rim);
      box-shadow: var(--lg_shadow_room_container);
      overflow: hidden;
      margin-top: 0;
      box-sizing: border-box;
    }
    #glass_layers {
      z-index: 1;
      align-self: stretch !important;
      justify-self: stretch !important;
      position: relative;
      width: 100%;
      min-height: 0;
      border-radius: var(--lg_radius_room);
      overflow: hidden;
      clip-path: inset(0 round var(--lg_radius_room));
      isolation: isolate;
      pointer-events: none;
    }
    /* 2A: name left + room-off right on one header row; panel spans below.
       Overrides folder shell's single-column room_title / room_panel. */
    #container {
      grid-template-areas:
        "room_title room_corner"
        "room_panel room_panel" !important;
      grid-template-columns: minmax(0, 1fr) auto !important;
      grid-template-rows: min-content min-content !important;
      align-items: center !important;
    }
    #name {
      grid-area: room_title !important;
      justify-self: start !important;
      text-align: left !important;
      width: auto !important;
      max-width: 100% !important;
      margin-bottom: var(--lg_space_room_title_gap);
    }
    /* Restate room glass stack structure (child extra_styles replaces parent
       room_container's), then climate-scoped light frame fills (1C). */
    .lg-glass-stack {
      position: absolute;
      inset: 0;
      border-radius: var(--lg_radius_room);
      overflow: hidden;
      clip-path: inset(0 round var(--lg_radius_room));
      isolation: isolate;
      pointer-events: none;
    }
    .lg-glass-stack__fill,
    .lg-glass-stack__frost,
    .lg-glass-stack__luminosity {
      position: absolute;
      inset: 0;
      border-radius: var(--lg_radius_room);
    }
    .lg-glass-stack__fill {
      background: var(--lg_color_room_glass_fill);
      backdrop-filter: blur(var(--lg_blur_room_glass)) saturate(var(--lg_saturate_room_glass));
      -webkit-backdrop-filter: blur(var(--lg_blur_room_glass)) saturate(var(--lg_saturate_room_glass));
    }
    .lg-glass-stack__frost {
      background: var(--lg_color_room_glass_frost);
      mix-blend-mode: plus-lighter;
    }
    .lg-glass-stack__luminosity {
      background: var(--lg_color_room_glass_luminosity);
      mix-blend-mode: soft-light;
    }
    .lg-glass-stack__fill {
      background: var(--lg_color_climate_room_glass_fill);
      backdrop-filter: blur(var(--lg_blur_climate_room_glass)) saturate(var(--lg_saturate_climate_room_glass));
      -webkit-backdrop-filter: blur(var(--lg_blur_climate_room_glass)) saturate(var(--lg_saturate_climate_room_glass));
    }
    .lg-glass-stack__frost {
      background: var(--lg_color_climate_room_glass_frost);
    }
    .lg-glass-stack__luminosity {
      background: var(--lg_color_climate_room_glass_luminosity);
    }
    #content {
      display: flex !important;
      flex-direction: column !important;
      align-items: center !important;
      justify-content: flex-start !important;
      box-sizing: border-box !important;
      margin-left: auto !important;
      margin-right: auto !important;
      border-color: var(--lg_color_climate_room_glass_rim) !important;
      /* Klimat-scoped override of the shared folder-shell #content
         overflow:hidden (lg_room_folder_shell_extra_styles): the mode Arc
         Speed Dials (climate_hvac_arc_dial / climate_fan_arc_dial) fan their
         option pills OUTWARD by lg_size_climate_arc_radius via transform;
         overflow:hidden clipped them so tapping the mode icon showed nothing.
         Visible here lets the arc escape the room panel. Climate-scoped only
         (not the shared room_container macro) => svitlo/light rooms untouched
         (global.mdc dashboard isolation). The glass panel visual is provided
         by the separate #glass_layers (own clip-path), so the rounded panel
         chrome is preserved; only the transient expanded arc spills out. */
      overflow: visible !important;
    }
    #content > * {
      width: 100% !important;
      max-width: 100% !important;
      box-sizing: border-box;
      margin-left: auto !important;
      margin-right: auto !important;
    }
    #content layout-card,
    #content grid-layout {
      width: 100% !important;
      max-width: 100% !important;
      display: grid !important;
      justify-content: center !important;
      justify-items: center !important;
      place-content: start center !important;
      box-sizing: border-box;
      margin-left: auto !important;
      margin-right: auto !important;
    }
    #content button-card,
    #content hui-card {
      justify-self: center !important;
      align-self: center !important;
      margin-left: auto !important;
      margin-right: auto !important;
    }
    @media (max-width: 48rem) {
      :host {
        /* True symmetric centering — phone masonry track has headroom over
           this width (see climate_floor_container.yaml phone conditional
           block), so the room no longer needs a left-align offset hack to
           compensate for a too-narrow/shared track. */
        width: min(100%, var(--lg_size_climate_container_w_phone)) !important;
        max-width: min(100%, var(--lg_size_climate_container_w_phone)) !important;
        justify-self: center !important;
        margin-left: auto !important;
        margin-right: auto !important;
        box-sizing: border-box !important;
      }
      ha-card {
        width: 100% !important;
        max-width: 100% !important;
        margin-left: auto !important;
        margin-right: auto !important;
        box-sizing: border-box !important;
      }
      #card {
        width: min(100%, var(--lg_size_climate_container_w_phone)) !important;
        max-width: min(100%, var(--lg_size_climate_container_w_phone)) !important;
        margin-left: auto !important;
        margin-right: auto !important;
        box-sizing: border-box !important;
      }
      #name {
        text-align: left !important;
        justify-self: start !important;
        width: auto !important;
      }
      #content {
        display: flex !important;
        flex-direction: column !important;
        align-items: center !important;
        justify-content: center !important;
        min-height: 100%;
        box-sizing: border-box !important;
      }
    }
    /* 2A: room-off sits in room_corner header cell (not absolute badge). */
    #corner {
      position: relative !important;
      top: auto !important;
      right: auto !important;
      grid-area: room_corner !important;
      justify-self: end !important;
      align-self: center !important;
      z-index: 5 !important;
      pointer-events: auto !important;
      margin-bottom: var(--lg_space_room_title_gap);
    }

