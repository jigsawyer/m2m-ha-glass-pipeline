# LiquidThermostatControl "ApproveButton" — shows the live pending
# (Adjusting, green pulse) or synced setpoint. Reads --lg_climate_pending_label /
# --lg_climate_action_shadow / --lg_climate_action_color INHERITED from the
# ancestor climate_thermostat_ring_panel (cross-shadow-boundary custom
# property inheritance). Tap = the ONLY commit: calls climate.set_temperature
# with the ring's pending value (analyzer.mdc §6), then collapses the outer
# climate_setpoint_trigger overlay back in place (no popup/navigate anymore
# — the ring lives in-place inside the trigger, see climate_setpoint_trigger).
climate_thermostat_action_btn:
  show_icon: false
  show_name: false
  show_state: false
  show_label: false
  show_ripple: false
  tap_action: |
    [[[
      /* Approve = the ONLY commit point (analyzer.mdc §6 deferred commit).
         Walk up to the ring panel host (.lg-ring-host) for the pending
         setpoint, and further to the outer trigger host
         (.lg-ring-trigger-host, climate_setpoint_trigger) to collapse the
         overlay after commit. Dragging the ring never calls a service —
         this does, exactly once. */
      const composedParent = (el) => {
        if (!el) return null;
        if (el.parentElement) return el.parentElement;
        const rn = el.getRootNode && el.getRootNode();
        return (rn && rn.host) || null;
      };
      let host = null;
      let triggerHost = null;
      let scope = this;
      for (let i = 0; i < 16 && scope; i++) {
        if (!host && scope.classList && scope.classList.contains('lg-ring-host')) host = scope;
        if (scope.classList && scope.classList.contains('lg-ring-trigger-host')) { triggerHost = scope; break; }
        scope = composedParent(scope);
      }
      const pending = (host && typeof host.__lgRingPending === 'number' && Number.isFinite(host.__lgRingPending))
        ? host.__lgRingPending : null;
      const id = (entity && entity.entity_id) || '';
      const cur = (entity && entity.attributes) ? Number(entity.attributes.temperature) : NaN;
      if (pending !== null && id && (!Number.isFinite(cur) || Math.abs(pending - cur) >= 0.05)) {
        try { hass.callService('climate', 'set_temperature', { entity_id: id, temperature: pending }); } catch (e) {}
        if (host) host.__lgRingPending = undefined;
      }
      if (triggerHost) {
        triggerHost.classList.remove('lg-ring-trigger-expanded');
        let wheelHost = null;
        let wscope = composedParent(triggerHost);
        for (let i = 0; i < 16 && wscope; i++) {
          if (wscope.classList && wscope.classList.contains('lg-wheel-host')) {
            wheelHost = wscope;
            break;
          }
          wscope = composedParent(wscope);
        }
        if (wheelHost) {
          wheelHost.classList.remove('lg-wheel-temp-open');
          wheelHost.__lgTempOpenedAt = 0;
        }
      }
      return { action: 'none' };
    ]]]
