# Utility row: swing (horizontal/vertical) + power as small glass chips in
# a horizontal flex row (replaces the retired grid-dock placement). Chip
# templates + services untouched: climate_swing_axis_chip / climate_power_btn.
# Satellite band — 4 small icon-only toggles orbiting the sun (swing
# vertical/horizontal + the new Turbo/Quiet switches). climate_power_btn
# is retired from here: room on/off now lives at the room_container
# corner as a hold-to-confirm button (climate_room_off_button).
climate_utility_row:
  show_icon: false
  show_name: false
  show_state: false
  show_label: false
  show_ripple: false
  variables:
    turbo_entity_id: ""
    quiet_entity_id: ""
  tap_action:
    action: none
  extra_styles: |
    [[[
      /* Collapse unsupported swing parent slots so display:none child hosts
         do not leave empty flex width (centers visible satellites under trigger).
         Support checks match climate_swing_axis_chip. */
      const a = (entity && entity.attributes) || {};
      const modes = Array.isArray(a.swing_modes) ? a.swing_modes : [];
      const hModes = Array.isArray(a.swing_horizontal_modes)
        ? a.swing_horizontal_modes
        : null;
      const hSupported = !!(hModes && hModes.length)
        || modes.some((m) => /^(horizontal|both)$/i.test(String(m)));
      const vSupported = modes.some((m) => /^(vertical|both|on|off)$/i.test(String(m)))
        || modes.length === 0;
      const slot = (on) => on
        ? `position: relative; width: var(--lg_size_climate_satellite_w) !important; height: var(--lg_size_climate_satellite_w) !important; flex: 0 0 auto !important; overflow: visible !important; display: block !important; margin: 0 !important; padding: 0 !important; min-width: var(--lg_size_climate_satellite_w) !important;`
        : `display: none !important; width: 0 !important; min-width: 0 !important; height: 0 !important; flex: 0 0 0 !important; margin: 0 !important; padding: 0 !important; overflow: hidden !important;`;
      const slotPhone = (on) => on
        ? `width: var(--lg_size_climate_satellite_w_phone) !important; height: var(--lg_size_climate_satellite_w_phone) !important; min-width: var(--lg_size_climate_satellite_w_phone) !important;`
        : `display: none !important; width: 0 !important; min-width: 0 !important; height: 0 !important;`;
      return `
    :host {
      width: fit-content !important;
      max-width: 100% !important;
      min-width: 0 !important;
      height: var(--lg_size_climate_satellite_w) !important;
      display: block;
      box-sizing: border-box;
      margin-left: auto !important;
      margin-right: auto !important;
      overflow: visible !important;
      background: transparent !important;
      box-shadow: none !important;
    }
    ha-card, #card {
      background: transparent !important;
      box-shadow: none !important;
      overflow: visible !important;
      width: fit-content !important;
      max-width: 100% !important;
      margin-left: auto !important;
      margin-right: auto !important;
    }
    #container {
      display: flex !important;
      flex-direction: row !important;
      justify-content: center !important;
      align-items: center !important;
      gap: var(--lg_space_climate_gap) !important;
      width: fit-content !important;
      max-width: 100% !important;
      height: var(--lg_size_climate_satellite_w) !important;
      box-sizing: border-box !important;
      margin-left: auto !important;
      margin-right: auto !important;
      overflow: visible !important;
    }
    #name, #icon, #label, #state { display: none !important; }
    #swing_horizontal { ${slot(hSupported)} }
    #swing_vertical { ${slot(vSupported)} }
    #turbo, #quiet {
      position: relative;
      width: var(--lg_size_climate_satellite_w) !important;
      height: var(--lg_size_climate_satellite_w) !important;
      flex: 0 0 auto !important;
      overflow: visible !important;
    }
    @media (max-width: 48rem) {
      :host, #container {
        height: var(--lg_size_climate_satellite_w_phone) !important;
      }
      #swing_horizontal { ${slotPhone(hSupported)} }
      #swing_vertical { ${slotPhone(vSupported)} }
      #turbo, #quiet {
        width: var(--lg_size_climate_satellite_w_phone) !important;
        height: var(--lg_size_climate_satellite_w_phone) !important;
      }
    }
      `;
    ]]]
  custom_fields:
    swing_horizontal:
      card:
        type: custom:button-card
        template: climate_swing_axis_chip
        entity: "[[[ return (entity && entity.entity_id) || '' ]]]"
        icon: mdi:arrow-left-right
        name: Горіз.
        variables:
          axis: horizontal
    swing_vertical:
      card:
        type: custom:button-card
        template: climate_swing_axis_chip
        entity: "[[[ return (entity && entity.entity_id) || '' ]]]"
        icon: mdi:arrow-up-down
        name: Верт.
        variables:
          axis: vertical
    turbo:
      card:
        type: custom:button-card
        template: climate_turbo_btn
        entity: "[[[ return (variables && variables.turbo_entity_id) || '' ]]]"
        variables:
          gate_entity_id: "[[[ return (entity && entity.entity_id) || '' ]]]"
    quiet:
      card:
        type: custom:button-card
        template: climate_quiet_btn
        entity: "[[[ return (variables && variables.quiet_entity_id) || '' ]]]"

# Round setpoint display / ActionCenterButton — tap toggles the in-place
# Ring ControlArc overlay (climate_thermostat_ring_panel + its nested
# climate_thermostat_action_btn) directly around itself: no popup, no
# navigate. Same expand/collapse state-machine climate_arc_dial already
# proved (.lg-arc-host / .lg-arc-expanded / --lg_arc_t), renamed here to
# .lg-ring-trigger-host / .lg-ring-trigger-expanded / --lg_ring_expand_t so
# it is never confused with the ring panel's OWN --lg_ring_t (the 0..1
# fill-fraction of the temperature itself) or its OWN .lg-ring-host marker
# (analyzer.mdc §6, revised — deferred commit / live entity bounds / TEMP
# gate are unchanged, only the shell moved in-place).
# Fullscreen tap-outside-to-close catcher for the temperature ring — the
# "empty space" half of the ring's 2 allowed close paths (the other half,
# "select", is climate_thermostat_action_btn's approve tap, which already
# collapses .lg-ring-trigger-expanded on commit). Mirrors
# climate_arc_overlay_btn's structure exactly but targets the ring
# trigger's OWN host class + --lg_ring_expand_pointer gate (the ring uses a
# separate class/property namespace from the HVAC/fan arc dials so the two
# families can never cross-toggle each other).
climate_ring_overlay_btn:
  show_icon: false
  show_name: false
  show_state: false
  show_label: false
  show_ripple: false
  tap_action: |
    [[[
      const composedParent = (el) => {
        if (!el) return null;
        if (el.parentElement) return el.parentElement;
        const rn = el.getRootNode && el.getRootNode();
        return (rn && rn.host) || null;
      };
      let triggerHost = null;
      let scope = composedParent(this);
      for (let i = 0; i < 12 && scope; i++) {
        if (scope.classList && scope.classList.contains('lg-ring-trigger-host')) {
          triggerHost = scope;
          break;
        }
        scope = composedParent(scope);
      }
      if (triggerHost) {
        triggerHost.classList.remove('lg-ring-trigger-expanded');
        /* Closing by tapping outside = cancel. Revert the ring panel to the
           live entity value — recompute the same "synced" snap/thumb the
           ring panel itself would render with no pending value, using its
           own stored __lgRingRange/__lgRingGeo (see
           climate_thermostat_ring_panel). */
        const ringHost = triggerHost.shadowRoot && triggerHost.shadowRoot.querySelector('.lg-ring-host');
        if (ringHost) {
          const r = ringHost.__lgRingRange || {};
          const geo = ringHost.__lgRingGeo || { onStart: 0, onLen: 100 };
          const snap = (Number.isFinite(r.setT) && r.span > 0)
            ? Math.max(0, Math.min(1, (r.setT - r.min) / r.span)) : 0;
          const theta = ((geo.onStart + snap * geo.onLen) / 100) * Math.PI * 2;
          const round4 = (n) => Math.round(n * 10000) / 10000;
          ringHost.__lgRingPending = undefined;
          ringHost.style.setProperty('--lg_ring_t', String(snap));
          ringHost.style.setProperty('--lg_ring_thumb_x', `${round4(50 + 44 * Math.sin(theta))}%`);
          ringHost.style.setProperty('--lg_ring_thumb_y', `${round4(50 - 44 * Math.cos(theta))}%`);
          ringHost.style.setProperty(
            '--lg_climate_pending_label',
            Number.isFinite(r.setT) ? `"${r.setT}\u00b0"` : '"\u2014"'
          );
          ringHost.style.setProperty('--lg_climate_action_shadow', 'var(--lg_shadow_liquid)');
          ringHost.style.setProperty('--lg_climate_action_color', 'var(--lg_color_text)');
        }
      }
      return { action: 'none' };
    ]]]
  extra_styles: |
    :host {
      position: fixed;
      inset: 0;
      display: block;
      width: 100vw;
      height: 100vh;
      max-width: 100vw;
      max-height: 100vh;
      /* Full-viewport Apple frost when ring is open (--lg_ring_expand_t
         inherited from climate_setpoint_trigger). */
      background: var(--lg_color_climate_focus_viewport_fill) !important;
      backdrop-filter: blur(var(--lg_blur_climate_focus_viewport)) saturate(var(--lg_saturate_climate_focus_viewport));
      -webkit-backdrop-filter: blur(var(--lg_blur_climate_focus_viewport)) saturate(var(--lg_saturate_climate_focus_viewport));
      opacity: var(--lg_ring_expand_t, 0);
      transition: opacity var(--lg_transition_climate_arc_overlay);
      box-shadow: none !important;
      overflow: hidden;
      pointer-events: var(--lg_ring_expand_pointer, none) !important;
      /* Below #ring_overlay (z-index:2) so drag/approve stay hittable;
         still covers the rest of the viewport for tap-outside close. */
      z-index: 1;
    }
    ha-card, #card, #container {
      background: transparent !important;
      box-shadow: none !important;
      width: 100%;
      height: 100%;
    }
    #icon, #name, #label, #state { display: none !important; }

climate_setpoint_trigger:
  show_icon: false
  show_name: false
  show_state: false
  show_label: false
  show_ripple: false
  tap_action: |
    [[[
      /* Open-only — same "2 close paths, not 3" rule as climate_arc_dial:
         re-tapping the merged status circle while the ring is already open
         must NOT toggle it shut. The ring now closes ONLY via
         frost dismiss (climate_wheel_temp_frost) or climate_thermostat_action_btn. */
      const composedParent = (el) => {
        if (!el) return null;
        if (el.parentElement) return el.parentElement;
        const rn = el.getRootNode && el.getRootNode();
        return (rn && rn.host) || null;
      };
      if (!this.classList.contains('lg-ring-trigger-expanded')) {
        this.classList.add('lg-ring-trigger-expanded');
        /* Open synchronously — both the trigger's own expanded class AND
           the wheel host's sticky lg-wheel-temp-open flag flip in the SAME
           tick (root-cause fix: the previous "arm frost only after an
           unrelated future document pointerup" hack deferred/decoupled
           these two flags indefinitely, which is why the ring/frost could
           stay desynced — TEMP "open" but the ring never actually visible,
           and the wheel segments, hidden while lg-wheel-temp-open, stuck
           hidden with no reliable way back). The same-gesture "tap opens
           then immediately dismiss-closes" race is now guarded by a
           timestamp debounce in climate_wheel_temp_frost's tap_action
           instead of by delaying the open. */
        let wheelHost = null;
        let scope = composedParent(this);
        for (let i = 0; i < 16 && scope; i++) {
          if (scope.classList && scope.classList.contains('lg-wheel-host')) {
            wheelHost = scope;
            break;
          }
          scope = composedParent(scope);
        }
        if (wheelHost) {
          wheelHost.classList.add('lg-wheel-temp-open');
          wheelHost.__lgTempOpenedAt = Date.now();
        }
      }
      return { action: 'none' };
    ]]]
  extra_styles: |
    [[[
      this.classList.add('lg-ring-trigger-host');
      /* Persist TEMP open across button-card re-renders: some re-renders of
         this nested card can wipe its own classList while the ANCESTOR
         wheel host (climate_global_wheel) — which owns the single
         lg-wheel-temp-open source of truth — keeps its class. Re-derive
         the expanded visual state from that ancestor every render so the
         two never drift apart. */
      const __lgComposedParent = (el) => {
        if (!el) return null;
        if (el.parentElement) return el.parentElement;
        const rn = el.getRootNode && el.getRootNode();
        return (rn && rn.host) || null;
      };
      let __lgWheel = null;
      let __lgScope = __lgComposedParent(this);
      for (let i = 0; i < 16 && __lgScope; i++) {
        if (__lgScope.classList && __lgScope.classList.contains('lg-wheel-host')) {
          __lgWheel = __lgScope;
          break;
        }
        __lgScope = __lgComposedParent(__lgScope);
      }
      if (__lgWheel && __lgWheel.classList.contains('lg-wheel-temp-open')) {
        this.classList.add('lg-ring-trigger-expanded');
      }
      const mode = entity ? entity.state : 'off';
      const color = mode === 'cool'
        ? 'var(--lg_color_climate_cool)'
        : mode === 'heat'
          ? 'var(--lg_color_climate_heat)'
          : 'var(--lg_color_text)';
      const glow = mode === 'cool'
        ? 'var(--lg_glow_climate_cool)'
        : mode === 'heat'
          ? 'var(--lg_glow_climate_heat)'
          : 'none';
      return `
    :host {
      --lg_ring_expand_t: 0;
      --lg_ring_expand_pointer: none;
      --lg_ring_expand_transition: var(--lg_transition_climate_arc_collapse);
      position: relative;
      z-index: 1;
    }
    :host(.lg-ring-trigger-expanded) {
      --lg_ring_expand_t: 1;
      --lg_ring_expand_pointer: auto;
      --lg_ring_expand_transition: var(--lg_transition_climate_arc_expand);
      z-index: 46;
    }
    @media (min-width: 48.0625rem) {
      :host(.lg-ring-trigger-expanded) {
        --lg_ring_expand_transition: var(--lg_transition_climate_arc_expand_desktop);
      }
    }
    :host {
      width: var(--lg_size_climate_setpoint_trigger_w) !important;
      max-width: var(--lg_size_climate_setpoint_trigger_w) !important;
      min-width: var(--lg_size_climate_setpoint_trigger_w) !important;
      height: var(--lg_size_climate_setpoint_trigger_w) !important;
      max-height: var(--lg_size_climate_setpoint_trigger_w) !important;
      min-height: var(--lg_size_climate_setpoint_trigger_w) !important;
      aspect-ratio: 1 !important;
      box-sizing: border-box;
      background: transparent !important;
      box-shadow: none !important;
    }
    @media (max-width: 48rem) {
      :host {
        width: var(--lg_size_climate_setpoint_trigger_w_phone) !important;
        max-width: var(--lg_size_climate_setpoint_trigger_w_phone) !important;
        min-width: var(--lg_size_climate_setpoint_trigger_w_phone) !important;
        height: var(--lg_size_climate_setpoint_trigger_w_phone) !important;
        max-height: var(--lg_size_climate_setpoint_trigger_w_phone) !important;
