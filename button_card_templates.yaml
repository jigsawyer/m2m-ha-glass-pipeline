climate_timer_pause_btn:
  template: climate_timer_action_chip
  variables:
    armed_entity_id: ""
    pause_clock_script_id: ""
  icon: |
    [[[
      return (entity && entity.state === 'paused') ? 'mdi:play' : 'mdi:pause';
    ]]]
  tap_action: |
    [[[
      const id = (entity && entity.entity_id) || '';
      const armedId = (variables && variables.armed_entity_id) || '';
      const pauseClockId = (variables && variables.pause_clock_script_id) || '';
      const armed = armedId && states[armedId] && states[armedId].state === 'on';
      const running = entity && (entity.state === 'active' || entity.state === 'paused');
      if (!running && armed && pauseClockId) {
        return {
          action: 'call-service',
          service: 'script.turn_on',
          target: { entity_id: pauseClockId },
        };
      }
      if (!id) return { action: 'none' };
      if (entity.state === 'paused') {
        return { action: 'call-service', service: 'timer.start', target: { entity_id: id } };
      }
      if (entity.state === 'active') {
        return { action: 'call-service', service: 'timer.pause', target: { entity_id: id } };
      }
      return { action: 'none' };
    ]]]

climate_timer_cancel_btn:
  template: climate_timer_action_chip
  icon: mdi:close
  variables:
    remove_script_id: ""
  tap_action: |
    [[[
      const id = (variables && variables.remove_script_id) || '';
      if (!id) return { action: 'none' };
      return {
        action: 'call-service',
        service: 'script.turn_on',
        target: { entity_id: id },
      };
    ]]]

climate_timer_edit_btn:
  template: climate_timer_action_chip
  icon: mdi:pencil
  variables:
    popup_hash: ""
    mode_entity_id: ""
    hours_entity_id: ""
    minutes_entity_id: ""
    clock_entity_id: ""
    clock_hour_entity_id: ""
    clock_minute_entity_id: ""
    armed_entity_id: ""
  tap_action: |
    [[[
      const parseDur = (raw) => {
        const parts = String(raw || '').split(':').map((p) => parseInt(p, 10) || 0);
        if (parts.length >= 3) return parts[0] * 3600 + parts[1] * 60 + parts[2];
        if (parts.length === 2) return parts[0] * 60 + parts[1];
        return 0;
      };
      const remSec = (ent) => {
        if (!ent) return 0;
        if (ent.state === 'paused') return parseDur(ent.attributes && ent.attributes.remaining);
        if (ent.state === 'active') {
          const fin = ent.attributes && ent.attributes.finishes_at;
          if (!fin) return 0;
          const ms = new Date(fin).getTime() - Date.now();
          return Number.isFinite(ms) ? Math.max(0, Math.floor(ms / 1000)) : 0;
        }
        return 0;
      };
      const modeId = (variables && variables.mode_entity_id) || '';
      const hoursId = (variables && variables.hours_entity_id) || '';
      const minutesId = (variables && variables.minutes_entity_id) || '';
      const clockId = (variables && variables.clock_entity_id) || '';
      const clockHId = (variables && variables.clock_hour_entity_id) || '';
      const clockMId = (variables && variables.clock_minute_entity_id) || '';
      const armedId = (variables && variables.armed_entity_id) || '';
      const hash = (variables && variables.popup_hash) || '';
      const running = entity && (entity.state === 'active' || entity.state === 'paused');
      const armed = armedId && states[armedId] && states[armedId].state === 'on';
      try {
        if (running) {
          if (modeId) hass.callService('input_select', 'select_option', { entity_id: modeId, option: 'duration' });
          let sec = remSec(entity);
          let hh = Math.floor(sec / 3600);
          let mm = Math.floor((sec % 3600) / 60);
          if ((sec % 60) > 0) {
            mm += 1;
            if (mm >= 60) { mm = 0; hh += 1; }
          }
          if (hh === 0 && mm === 0 && sec > 0) mm = 1;
          if (hoursId) hass.callService('input_number', 'set_value', { entity_id: hoursId, value: hh });
          if (minutesId) hass.callService('input_number', 'set_value', { entity_id: minutesId, value: mm });
        } else if (armed) {
          if (modeId) hass.callService('input_select', 'select_option', { entity_id: modeId, option: 'clock' });
          const clock = clockId ? states[clockId] : null;
          if (clock && clock.state) {
            const parts = String(clock.state).split(':');
            const ch = parseInt(parts[0], 10) || 0;
            const cm = parseInt(parts[1], 10) || 0;
            if (clockHId) hass.callService('input_number', 'set_value', { entity_id: clockHId, value: ch });
            if (clockMId) hass.callService('input_number', 'set_value', { entity_id: clockMId, value: cm });
          }
        }
      } catch (e) {}
      return { action: 'navigate', navigation_path: hash };
    ]]]

