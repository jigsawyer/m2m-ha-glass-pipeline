# ── Global liquid-glass game wheel (Klimat mode/fan SoT) ──────────────
# Equal-fill annular game wheel around climate_setpoint_trigger.
# Main N=6 (quiet/fan/turbo/timer/swingH/mode); fan N=5; mode N=6.
# Back sits at the clicked entry index. HA services unchanged.

climate_wheel_back_btn:
  show_icon: true
  show_name: false
  show_state: false
  show_label: false
  show_ripple: false
  icon: mdi:arrow-left
  variables:
    seg_index: 0
    seg_total: 6
  tap_action: |
    [[[
      const composedParent = (el) => {
        if (!el) return null;
        if (el.parentElement) return el.parentElement;
        const rn = el.getRootNode && el.getRootNode();
        return (rn && rn.host) || null;
      };
      let scope = composedParent(this);
      for (let i = 0; i < 16 && scope; i++) {
        if (scope.classList && scope.classList.contains('lg-wheel-host')) {
          scope.classList.remove('lg-wheel-layer-fan', 'lg-wheel-layer-mode');
          scope.classList.add('lg-wheel-layer-main');
          break;
        }
        scope = composedParent(scope);
      }
      return { action: 'none' };
    ]]]
  extra_styles: |
    [[[
      const __lgSegIdx = Number(variables.seg_index);
      const __lgSegTotal = Math.max(1, Number(variables.seg_total) || 6);
      const __lgSegSpan = 360 / __lgSegTotal;
      const __lgSegRot = (Number.isFinite(__lgSegIdx) ? __lgSegIdx : 0) * __lgSegSpan;
      /* Radial stops are % of closest-side (= half box) → box-% radii * 0.5 */
      const __lgInnerR = 19;
      const __lgOuterR = 24.75;
      const __lgClipPts = (() => {
        const pts = [];
        const steps = 14;
        const a0 = (-0.5 * __lgSegSpan) * Math.PI / 180;
        const a1 = (0.5 * __lgSegSpan) * Math.PI / 180;
        for (let i = 0; i <= steps; i++) {
          const t = a0 + (a1 - a0) * (i / steps);
          pts.push((50 + __lgOuterR * Math.sin(t)).toFixed(3) + '% ' + (50 - __lgOuterR * Math.cos(t)).toFixed(3) + '%');
        }
        for (let i = steps; i >= 0; i--) {
          const t = a0 + (a1 - a0) * (i / steps);
          pts.push((50 + __lgInnerR * Math.sin(t)).toFixed(3) + '% ' + (50 - __lgInnerR * Math.cos(t)).toFixed(3) + '%');
        }
        return pts.join(',');
      })();
      return `
    :host {
      position: absolute !important;
      left: 0 !important;
      top: 0 !important;
      width: 100% !important;
      height: 100% !important;
      max-width: none !important;
      max-height: none !important;
      min-width: 0 !important;
      min-height: 0 !important;
      margin: 0 !important;
      transform: rotate(${__lgSegRot}deg) !important;
      z-index: 2;
      box-sizing: border-box !important;
      pointer-events: none !important;
      background: transparent !important;
      box-shadow: none !important;
      aspect-ratio: auto !important;
      overflow: visible !important;
    }
    ha-card {
      width: 100% !important;
      height: 100% !important;
      background: transparent !important;
      box-shadow: none !important;
      overflow: visible !important;
      pointer-events: none !important;
    }
    #card {
      position: absolute !important;
      inset: 0 !important;
      width: 100% !important;
      height: 100% !important;
      max-width: none !important;
      max-height: none !important;
      aspect-ratio: 1 !important;
      border-radius: 0 !important;
      border: none !important;
      box-shadow: none !important;
      overflow: hidden !important;
      cursor: pointer;
      pointer-events: auto !important;
      background: transparent !important;
      /* clip-path = hit-test sector; mask = soft annular glass fill */
      clip-path: polygon(${__lgClipPts}) !important;
      -webkit-clip-path: polygon(${__lgClipPts}) !important;
      -webkit-mask-image:
        conic-gradient(
          from calc(-0.5 * ${__lgSegSpan}deg),
          #000 0deg,
          #000 calc(${__lgSegSpan} * 1deg),
          transparent calc(${__lgSegSpan} * 1deg)
        ),
        radial-gradient(
          closest-side,
          transparent var(--lg_size_climate_wheel_inner_pct),
          #000 calc(var(--lg_size_climate_wheel_inner_pct) + 0.15%),
          #000 var(--lg_size_climate_wheel_outer_pct),
          transparent calc(var(--lg_size_climate_wheel_outer_pct) + 0.15%)
        );
      mask-image:
        conic-gradient(
          from calc(-0.5 * ${__lgSegSpan}deg),
          #000 0deg,
          #000 calc(${__lgSegSpan} * 1deg),
          transparent calc(${__lgSegSpan} * 1deg)
        ),
        radial-gradient(
          closest-side,
          transparent var(--lg_size_climate_wheel_inner_pct),
          #000 calc(var(--lg_size_climate_wheel_inner_pct) + 0.15%),
          #000 var(--lg_size_climate_wheel_outer_pct),
          transparent calc(var(--lg_size_climate_wheel_outer_pct) + 0.15%)
        );
      -webkit-mask-composite: source-in;
      mask-composite: intersect;
    }
    #liquid_clip {
      position: absolute !important;
      inset: 0 !important;
      border-radius: 0 !important;
      overflow: hidden !important;
      background: var(--lg_color_climate_arc_glass_fill) !important;
      backdrop-filter: blur(var(--lg_blur_climate_arc_glass)) saturate(var(--lg_saturate_glass));
      -webkit-backdrop-filter: blur(var(--lg_blur_climate_arc_glass)) saturate(var(--lg_saturate_glass));
      box-shadow: var(--lg_shadow_climate_arc_sphere);
      pointer-events: none !important;
      z-index: 0 !important;
    }
    #container {
      position: absolute !important;
      inset: 0 !important;
      display: block !important;
      width: 100% !important;
      height: 100% !important;
      pointer-events: none !important;
    }
    #img-cell {
      position: absolute !important;
      left: 50% !important;
      top: 28.125% !important;
      width: var(--lg_size_climate_wheel_seg_icon) !important;
      height: var(--lg_size_climate_wheel_seg_icon) !important;
      transform: translate(-50%, -50%) rotate(calc(-1 * ${__lgSegRot}deg)) !important;
      pointer-events: none !important;
      z-index: 2 !important;
    }
    #icon {
      width: var(--lg_size_climate_wheel_seg_icon) !important;
      height: var(--lg_size_climate_wheel_seg_icon) !important;
      --mdc-icon-size: var(--lg_size_climate_wheel_seg_icon);
      transform: none !important;
    }
    @media (max-width: 48rem) {
      #img-cell, #icon {
        width: var(--lg_size_climate_wheel_seg_icon_phone) !important;
        height: var(--lg_size_climate_wheel_seg_icon_phone) !important;
        --mdc-icon-size: var(--lg_size_climate_wheel_seg_icon_phone);
      }
    }
    #name, #label, #state { display: none !important; }
    #liquid_clip { background: var(--lg_color_climate_arc_glass_fill) !important; }
    #icon { color: var(--lg_color_text) !important; opacity: 0.92; }
      `;
    ]]]
  custom_fields:
    liquid_clip: >
      <div class="lg-liquid-clip-shell"></div>

