climate_timer_active_bar:
  show_icon: false
  show_name: false
  show_state: false
  show_label: false
  show_ripple: false
  variables:
    clock_entity_id: ""
    armed_entity_id: ""
    popup_hash: ""
    mode_entity_id: ""
    hours_entity_id: ""
    minutes_entity_id: ""
    clock_hour_entity_id: ""
    clock_minute_entity_id: ""
    remove_script_id: ""
    pause_clock_script_id: ""
  tap_action:
    action: none
  extra_styles: |
    [[[
      const parseDur = (raw) => {
        const parts = String(raw || '').split(':').map((p) => parseInt(p, 10) || 0);
        if (parts.length >= 3) return parts[0] * 3600 + parts[1] * 60 + parts[2];
        if (parts.length === 2) return parts[0] * 60 + parts[1];
        return 0;
      };
      const remSec = (ent) => {
        if (!ent) return 0;
        if (ent.state === 'paused') return parseDur(ent.attributes && ent.attributes.remaining);
        if (ent.state === 'active') {
          const fin = ent.attributes && ent.attributes.finishes_at;
          if (!fin) return 0;
          const ms = new Date(fin).getTime() - Date.now();
          return Number.isFinite(ms) ? Math.max(0, Math.floor(ms / 1000)) : 0;
        }
        return 0;
      };
      const fmtHMS = (sec) => {
        const h = Math.floor(sec / 3600);
        const m = Math.floor((sec % 3600) / 60);
        const s = sec % 60;
        return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
      };
      const clockRemSec = (clockState) => {
        const parts = String(clockState || '').split(':').map((p) => parseInt(p, 10) || 0);
        const hh = parts[0] || 0;
        const mm = parts[1] || 0;
        const ss = parts[2] || 0;
        const now = new Date();
        const target = new Date(now.getFullYear(), now.getMonth(), now.getDate(), hh, mm, ss, 0);
        if (target.getTime() <= now.getTime()) {
          target.setDate(target.getDate() + 1);
        }
        return Math.max(0, Math.floor((target.getTime() - now.getTime()) / 1000));
      };
      const running = entity && (entity.state === 'active' || entity.state === 'paused');
      const armedId = variables && variables.armed_entity_id;
      const clockId = variables && variables.clock_entity_id;
      const armed = !running && armedId && states[armedId] && states[armedId].state === 'on';
      const showActions = !!(running || armed);
      let label = '…';
      let progress = 0;
      let clockState = '';
      if (running) {
        const dur = parseDur(entity.attributes && entity.attributes.duration);
        const rem = remSec(entity);
        label = fmtHMS(rem);
        progress = dur > 0 ? Math.max(0, Math.min(1, 1 - (rem / dur))) : 0;
      } else if (armed && clockId && states[clockId] && states[clockId].state) {
        clockState = states[clockId].state;
        const rem = clockRemSec(clockState);
        label = fmtHMS(rem);
        const cardProbe = this;
        let initial = cardProbe.__lgTimerClockInitialRem;
        if (!initial || rem > initial) {
          initial = Math.max(rem, 1);
          cardProbe.__lgTimerClockInitialRem = initial;
        }
        progress = Math.max(0, Math.min(1, 1 - (rem / initial)));
      }
      const card = this;
      card.__lgTimerFinishesAt = (entity && entity.attributes && entity.attributes.finishes_at) || null;
      card.__lgTimerDurationSec = running ? parseDur(entity.attributes && entity.attributes.duration) : 0;
      card.__lgTimerPaused = entity && entity.state === 'paused';
      card.__lgTimerPausedRemaining = (entity && entity.state === 'paused')
        ? parseDur(entity.attributes && entity.attributes.remaining) : 0;
      card.__lgTimerArmed = !!(armed && clockState);
      card.__lgTimerClockState = clockState || '';
      if (!armed) {
        card.__lgTimerClockInitialRem = 0;
      }
      const tick = () => {
        const root = card.shadowRoot;
        if (!root) return;
        const labelEl = root.querySelector('.lg-climate-timer-active__label');
        if (!labelEl) return;
        if (card.__lgTimerArmed) {
          const rem = clockRemSec(card.__lgTimerClockState);
          labelEl.textContent = fmtHMS(rem);
          let initial = card.__lgTimerClockInitialRem || Math.max(rem, 1);
          if (rem > initial) {
            initial = rem;
            card.__lgTimerClockInitialRem = initial;
          }
          const p = Math.max(0, Math.min(1, 1 - (rem / initial)));
          card.style.setProperty('--lg_climate_timer_progress', String(p));
          return;
        }
        if (card.__lgTimerPaused) {
          labelEl.textContent = fmtHMS(card.__lgTimerPausedRemaining || 0);
          const dur = card.__lgTimerDurationSec || 0;
          const rem = card.__lgTimerPausedRemaining || 0;
          const p = dur > 0 ? Math.max(0, Math.min(1, 1 - (rem / dur))) : 0;
          card.style.setProperty('--lg_climate_timer_progress', String(p));
          return;
        }
        const fin = card.__lgTimerFinishesAt;
        if (!fin) return;
        const ms = new Date(fin).getTime() - Date.now();
        const rem = Number.isFinite(ms) ? Math.max(0, Math.floor(ms / 1000)) : 0;
        labelEl.textContent = fmtHMS(rem);
        const dur = card.__lgTimerDurationSec || 0;
        const p = dur > 0 ? Math.max(0, Math.min(1, 1 - (rem / dur))) : 0;
        card.style.setProperty('--lg_climate_timer_progress', String(p));
      };
      if (card.__lgTimerTick) {
        clearInterval(card.__lgTimerTick);
        card.__lgTimerTick = null;
      }
      card.style.setProperty('--lg_climate_timer_progress', String(progress));
      setTimeout(() => {
        const root = card.shadowRoot;
        if (!root) return;
        const slot = root.querySelector('#countdown');
        if (!slot) return;
        let live = root.querySelector('.lg-climate-timer-active');
        if (!live || !live.isConnected) {
          live = document.createElement('div');
          live.className = 'lg-climate-timer-active';
          const text = document.createElement('span');
          text.className = 'lg-climate-timer-active__label';
          text.textContent = label;
          live.appendChild(text);
          slot.appendChild(live);
        } else {
          const text = live.querySelector('.lg-climate-timer-active__label');
          if (text) text.textContent = label;
        }
        tick();
        if ((running && entity.state === 'active') || card.__lgTimerArmed) {
          card.__lgTimerTick = setInterval(tick, 1000);
        }
      }, 0);
      return `
    :host {
      width: fit-content !important;
      max-width: min(100%, var(--lg_size_climate_timer_active_w)) !important;
      min-width: 0 !important;
