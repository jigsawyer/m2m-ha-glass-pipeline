      --ha-card-border-radius: var(--lg_radius_liquid) !important;
      --masonry-view-card-margin: 0;
      --lg_climate_timer_progress: ${progress};
    }
    ha-card {
      width: fit-content !important;
      max-width: 100% !important;
      height: var(--lg_size_climate_timer_bar_h) !important;
      border-radius: var(--lg_radius_liquid) !important;
      overflow: visible !important;
      --ha-card-border-radius: var(--lg_radius_liquid) !important;
      background: transparent !important;
      box-shadow: none !important;
    }
    .lg-liquid-clip-shell {
      position: absolute;
      inset: 0;
      border-radius: var(--lg_radius_liquid);
      overflow: hidden;
      clip-path: inset(0 round var(--lg_radius_liquid));
      pointer-events: none;
    }
    #container {
      display: grid !important;
      grid-template-areas: "countdown pause cancel edit" !important;
      grid-template-columns: var(--lg_size_climate_timer_liquid_w) auto auto auto !important;
      grid-template-rows: var(--lg_size_climate_timer_bar_h) !important;
      align-items: center !important;
      justify-content: start !important;
      column-gap: var(--lg_space_climate_timer_actions_gap) !important;
      width: fit-content !important;
      max-width: 100% !important;
      height: 100% !important;
      box-sizing: border-box !important;
      padding: 0 !important;
      margin: 0 !important;
    }
    #card {
      position: relative;
      width: fit-content !important;
      max-width: 100% !important;
      height: var(--lg_size_climate_timer_bar_h) !important;
      border-radius: var(--lg_radius_liquid);
      border: none;
      background: transparent;
      overflow: visible;
      box-shadow: none;
    }
    #liquid_clip {
      grid-area: countdown !important;
      position: relative !important;
      inset: auto !important;
      width: var(--lg_size_climate_timer_liquid_w) !important;
