    .lg-climate-timer-duration__overlay {
      position: absolute;
      inset: 0;
      z-index: 2;
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      border: 0;
      opacity: 0;
      cursor: pointer;
      pointer-events: auto !important;
      -webkit-appearance: none;
      appearance: none;
      background: transparent;
      color: transparent;
      font-size: 1.25rem;
    }
    .lg-climate-timer-duration__label {
      color: var(--lg_color_text);
      font-family: var(--lg_font_label_family);
      font-size: var(--lg_font_climate_timer_duration_label_size);
      font-weight: var(--lg_font_title_weight);
