# =============================================================================
# AUTOMATIONS
# =============================================================================

# --- Duration: timer.finished → climate.turn_off ---
#
# alias: Turn off Kabinet AC when sleep timer finishes
# triggers:
#   - trigger: timer.finished
#     target:
#       entity_id: timer.kabinet_ac_sleep
# actions:
#   - action: climate.turn_off
#     target:
#       entity_id: climate.kabinet_konditsioner_kabinet
#
# alias: Turn off Spalnia AC when sleep timer finishes
# triggers:
#   - trigger: timer.finished
#     target:
#       entity_id: timer.spalnia_ac_sleep
# actions:
#   - action: climate.turn_off
#     target:
#       entity_id: climate.spalnia_konditsioner_spalnia

# --- Clock: time at input_datetime + armed → climate.turn_off + disarm ---
# Bare time+input_datetime fires every day; arm boolean makes it one-shot.
# Docs: https://www.home-assistant.io/integrations/input_datetime/
#       https://www.home-assistant.io/docs/automation/trigger/#time-trigger
# Duration timer.finished automations stay in /config/automations.yaml (do not
# duplicate here). Clock automations below are package-owned.

automation:
  - id: klimat_kabinet_ac_off_at_armed_clock
    alias: Turn off Kabinet AC at armed clock time
    mode: single
    triggers:
      - trigger: time
        at: input_datetime.kabinet_ac_off_at
    conditions:
      - condition: state
        entity_id: input_boolean.kabinet_ac_off_armed
        state: "on"
    actions:
      - action: climate.turn_off
        target:
          entity_id: climate.kabinet_konditsioner_kabinet
      - action: input_boolean.turn_off
        target:
          entity_id: input_boolean.kabinet_ac_off_armed

  - id: klimat_spalnia_ac_off_at_armed_clock
    alias: Turn off Spalnia AC at armed clock time
    mode: single
    triggers:
      - trigger: time
        at: input_datetime.spalnia_ac_off_at
    conditions:
      - condition: state
        entity_id: input_boolean.spalnia_ac_off_armed
        state: "on"
    actions:
      - action: climate.turn_off
        target:
          entity_id: climate.spalnia_konditsioner_spalnia
      - action: input_boolean.turn_off
        target:
          entity_id: input_boolean.spalnia_ac_off_armed

# Known limitation (timer docs): if the timer finishes while HA is not running,
# timer.finished automations do not run after startup.
# Operator: copy/reload this package on HA host — publish_edge does not deploy it.
